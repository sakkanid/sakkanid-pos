<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SAKKANID Laundry POS</title>
<link rel="manifest" href="data:application/json,{}">
<meta name="theme-color" content="#006F98">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫧</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{
--pr:#006F98;--prl:#D9F0FB;--pr2:#1ABBEF;--pr2l:#C5EDFB;
--gn:#0D8A6A;--gnl:#E0F5EF;--gnd:#076B52;
--am:#C4820A;--aml:#FEF3C7;--rd:#C92A2A;--rdl:#FEE2E2;
--pp:#5B5FD6;--ppl:#EEEEFF;
--bg:#F0F3F5;--wh:#FFFFFF;--b1:#DDE1E5;--b2:#C8CDD3;
--t1:#1A2A3A;--t2:#344250;--t3:#6B7A88;
--ff:'IBM Plex Sans Thai',sans-serif;--fm:'IBM Plex Mono',monospace;
--r:10px;--sh:0 2px 14px rgba(0,80,130,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;overflow:hidden;height:100vh}
/* ═══ LOGIN ═══ */
#lockScreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#004E6B,#006F98 35%,#1ABBEF 70%,#7FD2FD 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.lock-logo{font-size:42px;font-weight:800;margin-bottom:4px;text-shadow:0 2px 20px rgba(0,0,0,.2)}
.lock-sub{opacity:.7;font-size:14px;margin-bottom:32px}
.user-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.user-btn{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:12px;padding:14px 20px;color:#fff;cursor:pointer;text-align:center;min-width:120px;transition:.2s}
.user-btn:hover,.user-btn.sel{background:rgba(255,255,255,.25);border-color:#fff;transform:scale(1.05)}
.user-btn .ub-name{font-weight:700;font-size:13px}.user-btn .ub-role{font-size:11px;opacity:.7}
.pin-area{text-align:center}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.5);transition:.2s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:8px;justify-content:center}
.pin-key{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;height:52px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--fm)}
.pin-key:hover{background:rgba(255,255,255,.25)}
.pin-key:active{transform:scale(.95)}
.pin-key.del{font-size:14px;font-weight:600}
.pin-msg{margin-top:14px;font-size:13px;min-height:20px}
/* ═══ APP SHELL ═══ */
#app{display:none;height:100vh;overflow:hidden}
.app-wrap{display:flex;height:100vh}
/* SIDEBAR */
.sidebar{width:220px;background:#003D55;color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:16px 18px;font-size:20px;font-weight:800;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
.sb-logo span{font-size:24px}
.sb-nav{flex:1;padding:8px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;font-weight:500;transition:.15s;margin-bottom:2px}
.sb-item:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-item.act{background:var(--pr);color:#fff;font-weight:700}
.sb-item .sb-icon{font-size:16px;width:22px;text-align:center}
.sb-item .sb-badge{margin-left:auto;background:var(--rd);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-section{padding:6px 14px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-top:10px;font-weight:700}
.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.1);font-size:11px}
.sb-footer .sf-name{font-weight:600;color:rgba(255,255,255,.8)}.sb-footer .sf-role{color:rgba(255,255,255,.4);font-size:10px}
.sb-logout{margin-top:6px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--ff);width:100%}
.sb-logout:hover{background:rgba(255,255,255,.2);color:#fff}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--wh);padding:12px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.topbar-title{font-size:18px;font-weight:700;color:var(--t1)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.content{flex:1;overflow-y:auto;padding:20px 24px}
/* ═══ COMPONENTS ═══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{opacity:.9;transform:translateY(-1px)}.btn:active{transform:scale(.98)}
.btn-pr{background:var(--pr);color:#fff}.btn-gn{background:var(--gn);color:#fff}
.btn-am{background:var(--am);color:#fff}.btn-rd{background:var(--rd);color:#fff}
.btn-out{background:var(--wh);color:var(--pr);border:1.5px solid var(--pr)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-lg{padding:10px 24px;font-size:15px}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none}
.card{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:18px 20px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg-pr{background:var(--prl);color:var(--pr)}.bg-gn{background:var(--gnl);color:var(--gnd)}
.bg-am{background:var(--aml);color:var(--am)}.bg-rd{background:var(--rdl);color:var(--rd)}
.bg-pp{background:var(--ppl);color:var(--pp)}.bg-gr{background:#F3F4F6;color:var(--t3)}
input,select,textarea{font-family:var(--ff);font-size:13px;padding:8px 12px;border:1.5px solid var(--b1);border-radius:8px;outline:none;transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--prl)}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--t3);margin-bottom:4px}
.grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);color:var(--t3);font-weight:600;text-align:left;padding:8px 10px;border-bottom:2px solid var(--b1);font-size:11px;text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid var(--b1);color:var(--t2);vertical-align:top}
tr:last-child td{border-bottom:none}
.kpi{background:linear-gradient(135deg,var(--prl),var(--wh));border:1px solid #B8E2F7;border-radius:var(--r);padding:14px;text-align:center}
.kpi-val{font-size:24px;font-weight:800;color:var(--pr);font-family:var(--fm)}.kpi-lbl{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase}
/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--wh);border-radius:14px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:800px}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;position:sticky;top:0;background:var(--wh);z-index:1;border-radius:14px 14px 0 0}
.modal-head h3{font-size:16px;font-weight:700;flex:1}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--b1);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--wh);border-radius:0 0 14px 14px}
/* ═══ TOAST ═══ */
#toastBox{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:600;animation:fadeIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast-ok{background:var(--gn)}.toast-err{background:var(--rd)}.toast-warn{background:var(--am)}.toast-info{background:var(--pr)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
/* ═══ ORDER CARD ═══ */
.o-card{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:10px;border-left:4px solid var(--pr)}
.o-card.st-wash{border-left-color:var(--am)}.o-card.st-ready{border-left-color:var(--gn)}.o-card.st-ship{border-left-color:var(--pp)}.o-card.st-done{border-left-color:var(--b2)}.o-card.st-cancel{border-left-color:var(--rd)}
.o-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.o-id{font-family:var(--fm);font-weight:700;font-size:13px;color:var(--pr)}
.o-type{font-size:11px}.o-date{margin-left:auto;font-size:11px;color:var(--t3)}
.o-cust{font-size:13px;font-weight:600;margin-bottom:4px}.o-info{font-size:12px;color:var(--t3)}
.o-total{font-family:var(--fm);font-weight:700;font-size:15px;color:var(--t1);margin-top:6px}
.o-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
/* ═══ STATUS FILTER ═══ */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--b1);background:var(--wh);color:var(--t3);transition:.15s}
.filter-chip:hover{border-color:var(--pr);color:var(--pr)}
.filter-chip.act{background:var(--pr);color:#fff;border-color:var(--pr)}
/* ═══ PRINT ═══ */
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:0;top:0;width:80mm;font-size:12px}}
/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
.sidebar{position:fixed;left:-260px;z-index:999;transition:.3s;width:260px;height:100vh}
.sidebar.open{left:0}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:998}
.sb-overlay.show{display:block}
.topbar .menu-btn{display:flex}
.g2,.g3,.g4{grid-template-columns:1fr}
.content{padding:14px}
}
@media(min-width:769px){.topbar .menu-btn{display:none}}
.menu-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);padding:4px}
/* STATUS COLORS */
.st-tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.st-tag.s-new{background:var(--prl);color:var(--pr)}.st-tag.s-wash{background:var(--aml);color:var(--am)}
.st-tag.s-ready{background:var(--gnl);color:var(--gnd)}.st-tag.s-ship{background:var(--ppl);color:var(--pp)}
.st-tag.s-done{background:var(--bg);color:var(--t3)}.st-tag.s-cancel{background:var(--rdl);color:var(--rd)}
.st-tag.s-book{background:#D9F0FB;color:#006F98}.st-tag.s-work{background:var(--rdl);color:var(--rd)}
.st-tag.s-unpaid{background:var(--rdl);color:var(--rd)}
.empty-state{text-align:center;padding:40px;color:var(--t3)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px}.empty-state .es-text{font-size:14px}
/* ═══ DARK MODE ═══ */
body.dark{--bg:#0F1419;--wh:#1A2332;--b1:#2A3A4A;--b2:#3A4A5A;--t1:#E8EDF2;--t2:#B0BEC5;--t3:#78909C;--sh:0 2px 14px rgba(0,0,0,.3)}
body.dark .sidebar{background:#0A1929}
body.dark #lockScreen{background:linear-gradient(135deg,#0A1929,#003D55 35%,#005577 70%,#006F98 100%)}
body.dark .topbar{background:#1A2332;border-color:#2A3A4A}
body.dark .kpi{background:linear-gradient(135deg,#1A2838,#1A2332);border-color:#2A3A4A}
body.dark th{background:#151F2E}
body.dark input,body.dark select,body.dark textarea{background:#1A2332;border-color:#2A3A4A;color:#E8EDF2}
body.dark .modal{background:#1A2332}
body.dark .modal-head,.dark .modal-foot{background:#1A2332;border-color:#2A3A4A}
body.dark .filter-chip{background:#1A2332;border-color:#2A3A4A;color:#78909C}
body.dark .o-card{background:#1A2332}
body.dark .btn-out{background:#1A2332;color:var(--pr);border-color:#2A3A4A}
body.dark .tab{color:#78909C}body.dark .tab.act{background:#1A2332}
.search-box{position:relative}.search-box input{padding-left:36px}
.search-box::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:16px}
.tab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--t3);transition:.15s}
.tab.act{background:var(--wh);color:var(--pr);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.paid-box{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;margin-top:8px}
.paid-box.yes{background:var(--gnl);color:var(--gnd)}.paid-box.no{background:var(--rdl);color:var(--rd)}
</style>
</head>
<body>

<!-- ═══ TOAST ═══ -->
<div id="toastBox"></div>

<!-- ═══ PRINT AREA ═══ -->

          <div class="search-box" style="width:200px"><input id="globalSearchInput" placeholder="🔍 ค้นหาออเดอร์/สมาชิก..." onkeydown="if(event.key==='Enter')globalSearch(this.value)" style="font-size:12px;padding:6px 10px 6px 32px"></div>

      </div>
      <div class="content" id="mainContent"></div>
    </div>
  </div>
</div>

<!-- ═══ MODAL CONTAINER ═══ -->
<div class="modal-overlay" id="moMember"><div class="modal" id="moMemberIn"></div></div>
<div class="modal-overlay" id="moNewMember"><div class="modal" id="moNewMemberIn"></div></div>
<div class="modal-overlay" id="moCreateOrder"><div class="modal modal-lg" id="moCreateOrderIn"></div></div>
<div class="modal-overlay" id="moAddItem"><div class="modal" id="moAddItemIn"></div></div>
<div class="modal-overlay" id="moPay"><div class="modal" id="moPayIn"></div></div>
<div class="modal-overlay" id="moBill"><div class="modal" id="moBillIn"></div></div>
<div class="modal-overlay" id="moDetail"><div class="modal modal-lg" id="moDetailIn"></div></div>
<div class="modal-overlay" id="moBuyPkg"><div class="modal" id="moBuyPkgIn"></div></div>
<div class="modal-overlay" id="moUseQuota"><div class="modal modal-lg" id="moUseQuotaIn"></div></div>

const $=id=>document.getElementById(id);
function genId(prefix){
  const key=prefix==='LDR'||prefix==='BED'||prefix==='CLN'||prefix==='PKB'?'orderSeq':prefix==='MBR'?'memberSeq':'quotaSeq';
  DB[key]=(DB[key]||0)+1;
  return prefix+'-'+String(DB[key]).padStart(4,'0');
}
function gO(oid){return DB.orders.find(o=>o.id===oid)}
function gM(mid){return DB.members.find(m=>m.id===mid)}
function thb(n){return '฿'+Number(n||0).toLocaleString('th-TH')}
function fmtDate(d){const dt=d?new Date(d):new Date();const D=String(dt.getDate()).padStart(2,'0'),M=String(dt.getMonth()+1).padStart(2,'0'),Y=dt.getFullYear()+543;return D+'/'+M+'/'+Y}
function fmtDT(d){const dt=d?new Date(d):new Date();return fmtDate(d)+' '+String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0')}
function fmtISO(iso){if(!iso) return '';try{return fmtDate(new Date(iso))}catch(e){return iso}}
function thaiNow(){var d=new Date();return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+(d.getFullYear()+543)+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}
function todayStr(){return new Date().toISOString().slice(0,10)}
function defaultPickupDate(){const d=new Date();d.setDate(d.getDate()+3);return d.toISOString().slice(0,10)}
function toast(msg,type='ok'){
  const el=document.createElement('div');el.className='toast toast-'+type;el.textContent=msg;
  $('toastBox').appendChild(el);setTimeout(()=>el.remove(),3000);
}
function openMo(id){$(id).classList.add('show')}
function closeMo(id){$(id).classList.remove('show')}
function saveDB(){localStorage.setItem('sj_db',JSON.stringify(DB))}
function loadDB(){
  const raw=localStorage.getItem('sj_db');
  if(raw){try{DB=JSON.parse(raw);return}catch(e){}}
  DB={orders:[],members:[],quotas:[],promos:[],shopSettings:{},orderSeq:0,memberSeq:0,quotaSeq:0,auditLog:[]};
  seedDemo();
}
function getShopSettings(){
  if(!DB.shopSettings) DB.shopSettings={};
  const s=DB.shopSettings;
  if(!s.shopName) s.shopName='ร้านซักรีด SAKKANID';
  if(!s.phone) s.phone='082-XXX-XXXX';
  if(!s.lineOA) s.lineOA='@sakkanid';
  if(!s.address) s.address='กรุงเทพฯ';
  if(!s.deliveryTiers) s.deliveryTiers=DEL_TIERS_DEFAULT;
  if(!s.paymentMethods) s.paymentMethods=PAY_METHODS_DEFAULT;
  if(!s.billFooter) s.billFooter='ขอบคุณที่ใช้บริการค่ะ 🫧';
  return s;
}
function getActivePromos(){
  const today=todayStr();
  return (DB.promos||[]).filter(p=>p.active && (!p.startDate||p.startDate<=today) && (!p.exp||p.exp>=today));
}
function pts4(net){const s=getShopSettings();const rate=s.ptsRate||100;return Math.floor(net/rate)}
function logAction(action,detail){
  if(!DB.auditLog) DB.auditLog=[];
  DB.auditLog.push({ts:new Date().toISOString(),user:curUser?curUser.nick:'',role:curUser?curUser.role:'',action,detail});
  if(DB.auditLog.length>5000) DB.auditLog=DB.auditLog.slice(-3000);
}
function getPayMethods(){return (getShopSettings().paymentMethods||PAY_METHODS_DEFAULT).filter(m=>m.active)}
function getStClass(st){
  if(st.includes('รับผ้า')||st==='รับจอง') return 's-new';
  if(st.includes('ระหว่างการซัก')||st==='ยืนยันนัด') return 's-wash';
  if(st.includes('พร้อมส่ง')) return 's-ready';
  if(st.includes('จัดส่ง')||st==='กำลังดำเนินการ') return 's-ship';
  if(st.includes('เสร็จสิ้น')||st==='ปิดงาน') return 's-done';
  if(st==='ยกเลิก') return 's-cancel';
  if(st.includes('รอชำระ')) return 's-unpaid';
  return 's-new';
}
function getOCardClass(st){
  if(st.includes('ระหว่าง')||st==='ยืนยันนัด') return 'st-wash';
  if(st.includes('พร้อมส่ง')) return 'st-ready';
  if(st.includes('จัดส่ง')||st.includes('Delivery')) return 'st-ship';
  if(st.includes('เสร็จสิ้น')||st==='ปิดงาน') return 'st-done';
  if(st==='ยกเลิก') return 'st-cancel';
  return '';
}
function netOf(o){return Math.max(0,(o.net||0))}
function paidTotal(o){return (o.payHist||[]).reduce((s,p)=>s+p.amt,0)}
function isPaidCheck(o){return paidTotal(o)>=netOf(o)}
function remaining(o){return Math.max(0,netOf(o)-paidTotal(o))}
function isEditable(o){
  if(o.type==='cleaning') return EDITABLE_CLN.includes(o.status);
  return EDITABLE_LDR.includes(o.status);
}

function initLockScreen(){
  $('lockScreen').style.display='flex';$('app').style.display='none';
  let h='';USERS.forEach((u,i)=>{
    h+='<div class="user-btn" onclick="selUser('+i+')"><div class="ub-name">'+u.nick+'</div><div class="ub-role">'+u.role+'</div></div>';
  });
  $('userGrid').innerHTML=h;
  $('pinArea').style.display='none';pinStr='';selUserIdx=null;
}
function selUser(i){
  selUserIdx=i;pinStr='';
  document.querySelectorAll('.user-btn').forEach((b,j)=>b.classList.toggle('sel',j===i));
  $('pinArea').style.display='block';
  $('pinUser').textContent=USERS[i].nick+' — กรุณาใส่ PIN';
  renderPinDots();renderPinPad();$('pinMsg').textContent='';
}
function renderPinDots(){
  let h='';for(let i=0;i<4;i++) h+='<div class="pin-dot'+(i<pinStr.length?' filled':'')+'"></div>';
  $('pinDots').innerHTML=h;
}
function renderPinPad(){
  let h='';
  for(let i=1;i<=9;i++) h+='<button class="pin-key" onclick="padPress(\''+i+'\')">'+i+'</button>';
  h+='<button class="pin-key del" onclick="padPress(\'clear\')">ล้าง</button>';
  h+='<button class="pin-key" onclick="padPress(\'0\')">0</button>';
  h+='<button class="pin-key del" onclick="padPress(\'del\')">⌫</button>';
  $('pinPad').innerHTML=h;
}
function padPress(k){
  if(k==='clear'){pinStr='';renderPinDots();$('pinMsg').textContent='';return}
  if(k==='del'){pinStr=pinStr.slice(0,-1);renderPinDots();return}
  if(pinStr.length>=4) return;
  pinStr+=k;renderPinDots();
  if(pinStr.length===4) checkPin();
}
function checkPin(){
  if(selUserIdx===null) return;
  if(pinStr===USERS[selUserIdx].pin){
    curUser=USERS[selUserIdx];
    logAction('LOGIN','เข้าสู่ระบบ');
    initApp();
  }else{
    $('pinMsg').innerHTML='<span style="color:#FF6B6B">❌ PIN ไม่ถูกต้อง</span>';
    pinStr='';setTimeout(renderPinDots,300);
  }
}
function doLogout(){
  logAction('LOGOUT','ออกจากระบบ');
  curUser=null;initLockScreen();
}

// ═══ APP INIT ═══
function initApp(){
  $('lockScreen').style.display='none';$('app').style.display='block';
  $('sfName').textContent=curUser.nick;$('sfRole').textContent=curUser.role;

function buildSidebar(){
  let h='',lastSec='';
  PAGES.forEach(p=>{
    if(p.section!==lastSec){h+='<div class="sb-section">'+p.section+'</div>';lastSec=p.section}
    h+='<div class="sb-item" data-page="'+p.id+'" onclick="navTo(\''+p.id+'\')"><span class="sb-icon">'+p.icon+'</span>'+p.label+'</div>';
  });
  $('sbNav').innerHTML=h;
}
function navTo(page){
  curPage=page;
  document.querySelectorAll('.sb-item').forEach(el=>el.classList.toggle('act',el.dataset.page===page));
  const pg=PAGES.find(p=>p.id===page);
  $('pageTitle').textContent=pg?pg.icon+' '+pg.label:'';
  renderPage(page);
  if(window.innerWidth<769) toggleSidebar(false);
}
function toggleSidebar(force){
  const sb=$('sidebar'),ov=$('sbOverlay');
  const open=force!==undefined?force:!sb.classList.contains('open');
  sb.classList.toggle('open',open);ov.classList.toggle('show',open);
}
function startClock(){setInterval(()=>{const d=new Date();$('clockEl').textContent=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')},1000)}

function confirmAddItem(){
  const cat=$('ai-cat').value,type=$('ai-type').value,opt=$('ai-opt')?$('ai-opt').value:'';

  const newItem={c:cat,t:type,o:opt,qty,p:price,k:item?item.k:0};

  if(window._editAddMode&&editOid){

    const o=gO(editOid);if(o){

function calcOrderTotal(){
  const itemsTotal=orderItems.reduce((s,it)=>s+it.p*it.qty,0);
  const extrasTotal=orderExtras.reduce((s,e)=>s+e.price,0);
  const disc=parseFloat($('co-disc')?$('co-disc').value:0)||0;
  const isDel=$('co-delivery')&&$('co-delivery').value==='delivery';
  const delCost=isDel?parseFloat($('co-del-sel')?$('co-del-sel').value:0)||0:0;
  const net=Math.max(0,itemsTotal+extrasTotal-disc+delCost);
  if($('co-total-box')) $('co-total-box').innerHTML='ยอดสุทธิ: '+thb(net);
}

// ═══ SAVE ORDER ═══
function saveOrder(){
  if(!orderItems.length){toast('กรุณาเพิ่มรายการซักอย่างน้อย 1 รายการ','err');return}
  const m=gM(orderMemberId);if(!m){toast('ไม่พบข้อมูลลูกค้า','err');return}
  const isDel=$('co-delivery').value==='delivery';
  const delCost=isDel?parseFloat($('co-del-sel').value)||0:0;
  var disc=parseFloat($('co-disc').value)||0;
  // Apply promo
  var promoName='';
  const promoIdx=$('co-promo')?$('co-promo').value:'';
  if(promoIdx!==''){
    const promos=getActivePromos();const promo=promos[parseInt(promoIdx)];
    if(promo){
      promoName=promo.name;
      const itemsT=orderItems.reduce((s,it)=>s+it.p*it.qty,0)+orderExtras.reduce((s,e)=>s+e.price,0);
      if(promo.type==='percent') disc+=Math.round(itemsT*promo.value/100);
      else if(promo.type==='fixed'||promo.type==='points') disc+=promo.value;
      if(promo.type==='points'&&promo.ptsNeeded){m.pts=Math.max(0,(m.pts||0)-promo.ptsNeeded)}
    }
  }
  const itemsTotal=orderItems.reduce((s,it)=>s+it.p*it.qty,0);
  const extrasTotal=orderExtras.reduce((s,e)=>s+e.price,0);
  const net=Math.max(0,itemsTotal+extrasTotal-disc+delCost);
  const cost=orderItems.reduce((s,it)=>s+it.k*it.qty,0);
  const paidNow=$('co-paid').value==='1';
  var payAmt=paidNow?(parseFloat($('co-payamt')?$('co-payamt').value:0)||net):0;
  var payDate=paidNow?fmtDate(new Date($('co-paydate')?$('co-paydate').value:new Date())):'';
  var payTime=paidNow?($('co-paytime')?$('co-paytime').value:''):'';
  var payDateStr=payDate+(payTime?' '+payTime:'');
  const payHist=paidNow?[{round:1,method:$('co-method')?$('co-method').value:'เงินสด',amt:payAmt,date:payDateStr,by:curUser.nick}]:[];
  const order={
    id:genId('LDR'),type:'laundry',mid:m.id,mname:m.name,mphone:m.phone,
    status:'รับผ้ารอส่งซัก',delivery:isDel?'delivery':'pickup',
    delCost:delCost,deliveryAddr:isDel?($('co-addr')?$('co-addr').value.trim():''):'',
    items:[...orderItems],extras:[...orderExtras],disc:disc,net:net,cost:cost,
    payHist:payHist,isPaid:paidNow&&payAmt>=net,pts:pts4(net),
    promo:promoName,note:$('co-note')?$('co-note').value.trim():'',
    pickupDate:$('co-pickup')?$('co-pickup').value:'',
    createdAt:fmtDT(),by:curUser.nick
  };
  DB.orders.push(order);
  if(order.isPaid){m.spend=(m.spend||0)+net;m.pts=(m.pts||0)+order.pts}
  saveDB();
  logAction('CREATE_ORDER',order.id+' '+thb(net)+(promoName?' โปร:'+promoName:''));
  toast('สร้างออเดอร์สำเร็จ ✅ '+order.id);
  closeMo('moCreateOrder');navTo('orders');
}

// ═══ STATUS CHANGE ═══
function advanceStatus(oid){
  const o=gO(oid);if(!o) return;
  const statuses=o.type==='cleaning'?STATUSES_CLN:STATUSES_LDR;
  const idx=statuses.indexOf(o.status);
  if(idx<0||idx>=statuses.length-2) return;
  const nextSt=statuses[idx+1];
  // ต้องชำระก่อนเปลี่ยนเป็น "เสร็จสิ้น" หรือ "ปิดงาน" เท่านั้น
  if((nextSt==='เสร็จสิ้น'||nextSt==='ปิดงาน')&&!isPaidCheck(o)){
    toast('⚠️ ต้องชำระเงินให้ครบก่อนเปลี่ยนเป็น "'+nextSt+'"','err');return;
  }
  o.status=nextSt;saveDB();
  logAction('CHANGE_STATUS',oid+' → '+nextSt);
  toast(oid+' → '+nextSt);renderPage(curPage);
}

  const o=gO(payOrderId);if(!o) return;
  const amt=parseFloat($('pay-amt').value)||0;
  if(amt<=0){toast('กรุณากรอกจำนวนเงิน','err');return}
  const method=$('pay-method')?$('pay-method').value:'เงินสด';
  const payDate=$('pay-date')?$('pay-date').value:todayStr();
  const payTime=$('pay-time')?$('pay-time').value:'';
  const dateStr=fmtDate(new Date(payDate))+(payTime?' '+payTime:'');
  if(!o.payHist) o.payHist=[];
  o.payHist.push({round:o.payHist.length+1,method:method,amt:amt,date:dateStr,by:curUser.nick});
  o.isPaid=isPaidCheck(o);
  if(o.isPaid){const m=gM(o.mid);if(m){m.spend=(m.spend||0)+netOf(o);m.pts=(m.pts||0)+(o.pts||0)}}
  saveDB();
  logAction('COLLECT_PAYMENT',payOrderId+' '+thb(amt)+' '+method+' '+dateStr);
  toast('รับเงินสำเร็จ ✅ '+thb(amt));
  closeMo('moPay');renderPage(curPage);
}

    }).join('')+'</table>'+(isInit?'':'<div style="font-size:11px;color:var(--am);margin-top:4px">🔒 รายการถูกล็อค — ไม่สามารถแก้ไขจำนวน/ลบ/เพิ่ม ได้หลังเปลี่ยนสถานะแล้ว</div>');

function editItemQty(i,val){

function editRemoveItem(i){

function editAddExtra(){
  const name=$('eex-name')?$('eex-name').value.trim():'';

  if(!name||!price){toast('กรอกชื่อและราคา','warn');return}
  editExtras.push({name:name,price:price});
  $('eex-name').value='';$('eex-price').value='';
  $('eo-extras-list').innerHTML=renderEditExtras();
  const o=gO(editOid);if(o) $('eo-total-box').innerHTML=calcEditTotalDisplay(o);

function editRemoveExtra(i){
  editExtras.splice(i,1);
  $('eo-extras-list').innerHTML=renderEditExtras();
  const o=gO(editOid);if(o) $('eo-total-box').innerHTML=calcEditTotalDisplay(o);

function editDeliveryChange(){
  var isDel=$('eo-delivery')&&$('eo-delivery').value==='delivery';
  if($('eo-del-tier')) $('eo-del-tier').style.display=isDel?'block':'none';
  if($('eo-del-addr')) $('eo-del-addr').style.display=isDel?'block':'none';
  var o=gO(editOid);if(o) $('eo-total-box').innerHTML=calcEditTotalDisplay(o);
}
function eoPromoChange(){
  var o=gO(editOid);if(!o) return;
  var pi=$('eo-promo')?$('eo-promo').value:'';
  if(pi!==''){
    var promos=getActivePromos();var pr=promos[parseInt(pi)];
    if(pr){
      var itemsT=(o.items||[]).reduce(function(s,it){return s+it.p*it.qty},0)+editExtras.reduce(function(s,e){return s+e.price},0);
      var promoDisc=pr.type==='percent'?Math.round(itemsT*pr.value/100):pr.value;
      if($('eo-disc'))$('eo-disc').value=promoDisc;
    }
  }
  $('eo-total-box').innerHTML=calcEditTotalDisplay(o);
}
function eoRecalc(){var o=gO(editOid);if(o)$('eo-total-box').innerHTML=calcEditTotalDisplay(o)}
function calcEditTotalDisplay(o){
  var itemsTotal=(o.items||[]).reduce(function(s,it){return s+it.p*it.qty},0);
  var extrasTotal=editExtras.reduce(function(s,e){return s+e.price},0);
  var disc=parseFloat($('eo-disc')?$('eo-disc').value:o.disc)||0;
  var isDel=$('eo-delivery')?$('eo-delivery').value==='delivery':o.delivery==='delivery';
  var delCost=isDel?parseFloat($('eo-del-sel')?$('eo-del-sel').value:o.delCost)||0:0;
  var net=Math.max(0,itemsTotal+extrasTotal-disc+delCost);
  var paid=paidTotal(o);
  var newRemaining=Math.max(0,net-paid);
  var result='ยอดสุทธิ: '+thb(net);
  if(paid>0&&net>o.net){
    result+='<div style="font-size:12px;color:var(--rd);margin-top:4px">⚠️ ยอดเพิ่มขึ้น '+thb(net-o.net)+' → ต้องเก็บเพิ่ม '+thb(newRemaining)+'</div>';
  }else if(paid>0&&paid>=net){
    result+='<div style="font-size:12px;color:var(--gn);margin-top:4px">✅ ชำระครบแล้ว (จ่ายไป '+thb(paid)+')</div>';
  }
  return result;
}
function saveEditOrder(){
  const o=gO(editOid);if(!o) return;
  o.extras=[...editExtras];
  o.disc=parseFloat($('eo-disc').value)||0;
  // Save promo
  var epi=$('eo-promo')?$('eo-promo').value:'';
  if(epi!==''){var eps=getActivePromos();var epr=eps[parseInt(epi)];if(epr)o.promo=epr.name}else{o.promo=''}
  o.note=$('eo-note')?$('eo-note').value.trim():'';
  o.pickupDate=$('eo-pickup')?$('eo-pickup').value:'';
  if($('eo-delivery')){
    o.delivery=$('eo-delivery').value;
    o.delCost=o.delivery==='delivery'?parseFloat($('eo-del-sel')?$('eo-del-sel').value:0)||0:0;
    o.deliveryAddr=o.delivery==='delivery'?($('eo-addr')?$('eo-addr').value.trim():''):'';
  }
  const itemsTotal=(o.items||[]).reduce(function(s,it){return s+it.p*it.qty},0);
  const extrasTotal=o.extras.reduce(function(s,e){return s+e.price},0);
  o.net=Math.max(0,itemsTotal+extrasTotal-o.disc+(o.delCost||0));
  o.cost=(o.items||[]).reduce(function(s,it){return s+it.k*it.qty},0);
  o.isPaid=isPaidCheck(o);
  saveDB();logAction('EDIT_ORDER',editOid+' ยอดใหม่: '+thb(o.net));
  toast('แก้ไขสำเร็จ ✅ ยอด: '+thb(o.net));closeMo('moEditOrder');renderPage(curPage);
}

function renderHistoryPage(c){
  const done=DB.orders.filter(o=>['เสร็จสิ้น','ปิดงาน','ยกเลิก'].includes(o.status)).reverse();
  c.innerHTML='<div class="card"><div class="card-title">🕐 ประวัติการขาย ('+done.length+' รายการ)</div>'+

    '<button class="btn btn-out" onclick="exportHistory()">📤 Export CSV</button></div>'+
    '<div id="histList">'+renderHistoryList(done)+'</div></div>';
}
function renderHistoryList(done){
  if(!done.length) return '<div class="empty-state"><div class="es-text">ยังไม่มีประวัติ</div></div>';
  return done.map(function(o){
    var itemsHtml=(o.items||[]).map(function(it){return '<span style="display:inline-block;background:var(--bg);padding:1px 6px;border-radius:4px;font-size:10px;margin:1px">'+it.t+(it.o?' '+it.o:'')+' x'+it.qty+' '+thb(it.p*it.qty)+'</span>'}).join(' ');
    var extrasHtml=(o.extras||[]).length?'<span style="display:inline-block;background:var(--aml);padding:1px 6px;border-radius:4px;font-size:10px;margin:1px">เสริม: '+(o.extras||[]).map(function(e){return e.name+' '+thb(e.price)}).join(', ')+'</span>':'';
    return '<div class="o-card '+getOCardClass(o.status)+'" style="cursor:pointer" onclick="showOrderDetail(\''+o.id+'\')">'+
      '<div class="o-head"><span class="o-id">'+o.id+'</span><span class="badge bg-gr">'+o.type+'</span><span class="st-tag '+getStClass(o.status)+'">'+o.status+'</span><span class="o-date">'+o.createdAt+'</span></div>'+
      '<div class="o-cust">'+o.mname+' · '+o.mphone+'</div>'+
      '<div style="margin:4px 0">'+itemsHtml+extrasHtml+'</div>'+
      '<div style="display:flex;align-items:center;gap:8px"><span class="o-total">'+thb(o.net)+'</span>'+(o.disc?'<span style="font-size:10px;color:var(--rd)">ส่วนลด -'+thb(o.disc)+'</span>':'')+(o.promo?'<span class="badge bg-am">🎁 '+o.promo+'</span>':'')+'<span class="badge bg-gn">✅</span></div></div>';
  }).join('');
}
function filterHistory(){
  const q=($('histSearch')?$('histSearch').value:'').toLowerCase();
  const done=DB.orders.filter(o=>['เสร็จสิ้น','ปิดงาน','ยกเลิก'].includes(o.status)&&(o.id.toLowerCase().includes(q)||o.mname.toLowerCase().includes(q))).reverse();
  $('histList').innerHTML=renderHistoryList(done);
}
function exportHistory(){
  const done=DB.orders.filter(o=>['เสร็จสิ้น','ปิดงาน','ยกเลิก'].includes(o.status));
  let csv='เลขออเดอร์,ลูกค้า,ประเภท,ยอดสุทธิ,ต้นทุน,สถานะ,วันที่\n';
  done.forEach(o=>{csv+=o.id+','+o.mname+','+o.type+','+o.net+','+(o.cost||0)+','+o.status+','+o.createdAt+'\n'});
  const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='SAKKANID_history_'+todayStr()+'.csv';a.click();
  toast('Export CSV สำเร็จ ✅');
}

// ═══ CALENDAR PAGE — IMPROVED ═══
let calYear,calMonth;
function renderCalendarPage(c){
  const now=new Date();calYear=now.getFullYear();calMonth=now.getMonth();
  c.innerHTML='<div class="card" id="calCard"><div class="card-title">📅 ปฏิทินการจองทำความสะอาด</div>'+buildCalendar(calYear,calMonth)+'</div>'+
    '<div class="card" id="calDetail"><div class="empty-state"><div class="es-icon">👆</div><div class="es-text">คลิกวันที่เพื่อดูรายละเอียด</div></div></div>';
}
function calNav(dir){
  calMonth+=dir;
  if(calMonth>11){calMonth=0;calYear++}
  if(calMonth<0){calMonth=11;calYear--}
  $('calCard').innerHTML='<div class="card-title">📅 ปฏิทินการจองทำความสะอาด</div>'+buildCalendar(calYear,calMonth);
}
function buildCalendar(year,month){
  const first=new Date(year,month,1);const lastDay=new Date(year,month+1,0).getDate();
  const startDay=first.getDay();
  const cleanings=DB.orders.filter(o=>o.type==='cleaning'&&o.pickupDate);
  const monthNames=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  let h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
    '<button class="btn btn-out btn-sm" onclick="calNav(-1)">◀</button>'+
    '<span style="font-weight:700;font-size:16px">'+monthNames[month]+' '+(year+543)+'</span>'+
    '<button class="btn btn-out btn-sm" onclick="calNav(1)">▶</button></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">';
  ['อา','จ','อ','พ','พฤ','ศ','ส'].forEach(d=>{h+='<div style="font-weight:700;font-size:11px;color:var(--t3);padding:6px">'+d+'</div>'});
  for(let i=0;i<startDay;i++) h+='<div></div>';
  for(let d=1;d<=lastDay;d++){
    const dateStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayClean=cleanings.filter(o=>o.pickupDate===dateStr);
    const isToday=dateStr===todayStr();
    const hasCln=dayClean.length>0;
    h+='<div onclick="showCalDay(\''+dateStr+'\')" style="padding:8px 4px;border-radius:8px;font-size:13px;cursor:pointer;transition:.15s;border:1.5px solid '+(isToday?'var(--pr)':'transparent')+';'+(hasCln?'background:var(--gnl);':'')+'">'+
      '<div style="font-weight:'+(isToday?'800':'400')+'">'+d+'</div>'+
      (hasCln?'<div style="font-size:9px;color:var(--gn);font-weight:700">'+dayClean.length+' งาน</div>':'')+
      '</div>';
  }
  h+='</div>';
  // Monthly summary
  const monthClean=cleanings.filter(o=>{const d=o.pickupDate;return d&&d.startsWith(year+'-'+String(month+1).padStart(2,'0'))});
  h+='<div style="margin-top:12px;font-size:12px;color:var(--t3)">งานเดือนนี้: <strong>'+monthClean.length+'</strong> · รายได้: <strong>'+thb(monthClean.reduce((s,o)=>s+netOf(o),0))+'</strong></div>';
  return h;
}
function showCalDay(dateStr){
  const cleanings=DB.orders.filter(o=>o.type==='cleaning'&&o.pickupDate===dateStr);
  const el=$('calDetail');
  if(!cleanings.length){
    el.innerHTML='<div class="card-title">📅 '+dateStr+'</div><div class="empty-state"><div class="es-text">ไม่มีงานวันนี้</div></div>'+
      '<button class="btn btn-pr" onclick="startNewOrder(\'cln\')">➕ เพิ่มงาน Cleaning</button>';
    return;
  }
  el.innerHTML='<div class="card-title">📅 '+dateStr+' — '+cleanings.length+' งาน</div>'+
    cleanings.map(o=>
      '<div class="o-card '+getOCardClass(o.status)+'" style="cursor:pointer" onclick="showOrderDetail(\''+o.id+'\')">'+
      '<div class="o-head"><span class="o-id">'+o.id+'</span><span class="st-tag '+getStClass(o.status)+'">'+o.status+'</span></div>'+
      '<div class="o-cust">'+o.mname+'</div>'+

function saveCRMSettings(){
  var s=getShopSettings();
  s.crm={ptsRate:parseInt($('crm-rate').value)||100,redeemRate:parseInt($('crm-redeem').value)||1,vipThreshold:parseInt($('crm-vip').value)||10000,welcomePts:parseInt($('crm-welcome').value)||50,silverMin:parseInt($('crm-silver').value)||3000,goldMin:parseInt($('crm-gold').value)||6000};
  s.ptsRate=s.crm.ptsRate;s.welcomePts=s.crm.welcomePts;
  saveDB();logAction('CHANGE_SETTINGS','อัปเดต CRM');toast('บันทึกตั้งค่า CRM สำเร็จ ✅');
}
function autoUpdateLevels(){
  var s=getShopSettings();var crm=s.crm||{silverMin:3000,goldMin:6000,vipThreshold:10000};
  var updated=0;
  DB.members.forEach(function(m){
    var oldLv=m.level;
    if(m.spend>=crm.vipThreshold) m.level='VIP';
    else if(m.spend>=crm.goldMin) m.level='Gold';
    else if(m.spend>=crm.silverMin) m.level='Silver';
    else m.level='ทั่วไป';
    if(m.level!==oldLv) updated++;
  });
  saveDB();toast('อัปเดตระดับสำเร็จ ✅ เปลี่ยน '+updated+' คน');renderPage('crm');
}

function saveNewPromo(){

function rptFinancial(){
  var all=DB.orders.filter(function(o){return o.status!=='ยกเลิก'});
  var revenue=all.filter(function(o){return isPaidCheck(o)}).reduce(function(s,o){return s+netOf(o)},0);
  var cost=all.reduce(function(s,o){return s+(o.cost||0)},0);
  var expenses=(DB.expenses||[]).reduce(function(s,e){return s+e.amount},0);
  var payMethods={};all.forEach(function(o){(o.payHist||[]).forEach(function(p){if(!payMethods[p.method])payMethods[p.method]=0;payMethods[p.method]+=p.amt})});
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="margin:0">💰 การเงิน</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'financial\')">📤 Export</button></div>'+

    '<div class="card-title" style="font-size:13px">แยกตามวิธีชำระ</div><table><tr><th>วิธี</th><th>ยอดรวม</th></tr>'+Object.entries(payMethods).map(function(e){return '<tr><td>'+e[0]+'</td><td>'+thb(e[1])+'</td></tr>'}).join('')+'</table>';
}
function rptQuota(){
  var quotas=DB.quotas||[];
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="margin:0">📦 โควต้า Package ('+quotas.length+')</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'quota\')">📤 Export</button></div>'+
    (quotas.length?'<table><tr><th>สมาชิก</th><th>Package</th><th>ใช้แล้ว</th><th>คงเหลือ</th><th>ซื้อเมื่อ</th><th>หมดอายุ</th></tr>'+quotas.map(function(q){var m=gM(q.mid);return '<tr><td>'+(m?m.name:q.mid)+'</td><td>'+q.pkgName+'</td><td>'+q.used+'</td><td><strong>'+q.remain+'</strong></td><td>'+q.buyDate+'</td><td>'+q.exp+'</td></tr>'}).join('')+'</table>':'<div class="empty-state"><div class="es-text">ไม่มีโควต้า</div></div>');
}
function rptCleaning(){
  var orders=DB.orders.filter(function(o){return o.type==='cleaning'}).reverse();
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="margin:0">🧹 Cleaning ('+orders.length+')</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'cleaning\')">📤 Export</button></div>'+
    (orders.length?'<table><tr><th>เลข</th><th>ลูกค้า</th><th>ประเภท</th><th>วันนัด</th><th>ยอด</th><th>สถานะ</th></tr>'+orders.map(function(o){return '<tr><td>'+o.id+'</td><td>'+o.mname+'</td><td>'+(o.items[0]?o.items[0].t:'')+'</td><td>'+fmtISO(o.pickupDate)+(o.cleanTime?' '+o.cleanTime:'')+'</td><td>'+thb(o.net)+'</td><td><span class="st-tag '+getStClass(o.status)+'">'+o.status+'</span></td></tr>'}).join('')+'</table>':'<div class="empty-state"><div class="es-text">ไม่มีออเดอร์</div></div>');
}
function rptLaundry(){
  var orders=DB.orders.filter(function(o){return o.type==='laundry'}).reverse();
  var totalItems=orders.reduce(function(s,o){return s+(o.items||[]).reduce(function(ss,it){return ss+it.qty},0)},0);
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="margin:0">👕 ซักรีด ('+orders.length+' ออเดอร์ · '+totalItems+' ชิ้น)</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'laundry\')">📤 Export</button></div>'+
    (orders.length?'<table><tr><th>เลข</th><th>ลูกค้า</th><th>ชิ้น</th><th>ยอด</th><th>รับผ้า</th><th>สถานะ</th></tr>'+orders.slice(0,50).map(function(o){var qty=(o.items||[]).reduce(function(s,it){return s+it.qty},0);return '<tr><td>'+o.id+'</td><td>'+o.mname+'</td><td>'+qty+'</td><td>'+thb(o.net)+'</td><td>'+(o.delivery==='delivery'?'🚗':'🏪')+'</td><td><span class="st-tag '+getStClass(o.status)+'">'+o.status+'</span></td></tr>'}).join('')+'</table>':'');
}
function rptBedset(){
  var orders=DB.orders.filter(function(o){return o.type==='bedset'}).reverse();
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="margin:0">🛏️ เครื่องนอน ('+orders.length+')</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'bedset\')">📤 Export</button></div>'+
    (orders.length?'<table><tr><th>เลข</th><th>ลูกค้า</th><th>ขนาด</th><th>ยอด</th><th>สถานะ</th></tr>'+orders.map(function(o){return '<tr><td>'+o.id+'</td><td>'+o.mname+'</td><td>'+(o.items[0]?o.items[0].t:'')+'</td><td>'+thb(o.net)+'</td><td><span class="st-tag '+getStClass(o.status)+'">'+o.status+'</span></td></tr>'}).join('')+'</table>':'<div class="empty-state"><div class="es-text">ไม่มีออเดอร์</div></div>');
}
function rptDelivery(){
  var orders=DB.orders.filter(function(o){return o.delivery==='delivery'&&o.status!=='ยกเลิก'}).reverse();
  var totalDel=orders.reduce(function(s,o){return s+(o.delCost||0)},0);
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="margin:0">🚗 Delivery ('+orders.length+' · ค่าส่งรวม '+thb(totalDel)+')</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'delivery\')">📤 Export</button></div>'+
    (orders.length?'<table><tr><th>เลข</th><th>ลูกค้า</th><th>ที่อยู่</th><th>ค่าส่ง</th><th>ยอด</th><th>สถานะ</th></tr>'+orders.map(function(o){return '<tr><td>'+o.id+'</td><td>'+o.mname+'</td><td style="max-width:150px;overflow:hidden;text-overflow:ellipsis">'+(o.deliveryAddr||'-')+'</td><td>'+thb(o.delCost)+'</td><td>'+thb(o.net)+'</td><td><span class="st-tag '+getStClass(o.status)+'">'+o.status+'</span></td></tr>'}).join('')+'</table>':'');
}
function rptPromo(){
  var promoMap={};DB.orders.filter(function(o){return o.promo&&o.status!=='ยกเลิก'}).forEach(function(o){if(!promoMap[o.promo])promoMap[o.promo]={name:o.promo,count:0,totalDisc:0,totalRev:0};promoMap[o.promo].count++;promoMap[o.promo].totalDisc+=(o.disc||0);promoMap[o.promo].totalRev+=netOf(o)});
  var promos=Object.values(promoMap).sort(function(a,b){return b.count-a.count});
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="margin:0">🎁 โปรโมชั่น</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'promo\')">📤 Export</button></div>'+
    (promos.length?'<table><tr><th>โปร</th><th>ใช้(ครั้ง)</th><th>ส่วนลดรวม</th><th>ยอดขายรวม</th></tr>'+promos.map(function(p){return '<tr><td><strong>'+p.name+'</strong></td><td>'+p.count+'</td><td style="color:var(--rd)">'+thb(p.totalDisc)+'</td><td>'+thb(p.totalRev)+'</td></tr>'}).join('')+'</table>':'<div class="empty-state"><div class="es-text">ยังไม่มีการใช้โปร</div></div>');
}
function rptTopCustomer(){
  var stats=DB.members.map(function(m){var ords=DB.orders.filter(function(o){return o.mid===m.id&&o.status!=='ยกเลิก'});return{name:m.name,id:m.id,level:m.level,pts:m.pts,count:ords.length,spend:ords.reduce(function(s,o){return s+netOf(o)},0)}}).sort(function(a,b){return b.spend-a.spend}).slice(0,20);
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="margin:0">🏆 Top Customer (20 อันดับ)</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'top\')">📤 Export</button></div>'+
    '<table><tr><th>#</th><th>ลูกค้า</th><th>ระดับ</th><th>ออเดอร์</th><th>ยอดซื้อ</th><th>แต้ม</th></tr>'+stats.map(function(m,i){return '<tr><td>'+(i+1)+'</td><td><strong>'+m.name+'</strong></td><td><span class="badge bg-'+(m.level==='VIP'?'pp':m.level==='Gold'?'am':'gr')+'">'+m.level+'</span></td><td>'+m.count+'</td><td>'+thb(m.spend)+'</td><td>'+m.pts+'</td></tr>'}).join('')+'</table>';
}

    '<table><tr><th>เลข</th><th>ลูกค้า</th><th>ยอดสุทธิ</th><th>ค้างชำระ</th><th>วันที่</th><th></th></tr>'+
    unpaid.map(o=>'<tr><td>'+o.id+'</td><td>'+o.mname+'</td><td>'+thb(o.net)+'</td><td style="color:var(--rd);font-weight:700">'+thb(remaining(o))+'</td><td>'+o.createdAt+'</td><td><button class="btn btn-am btn-sm" onclick="openPayModal(\''+o.id+'\')">💰 เก็บเงิน</button> <button class="btn btn-out btn-sm" onclick="showLinePreview(\''+o.id+'\')">📱 เรียกเก็บ</button></td></tr>').join('')+'</table>';
}
function renderMemberReport(){
  const memberStats=DB.members.map(m=>{
    const orders=DB.orders.filter(o=>o.mid===m.id&&o.status!=='ยกเลิก');
    return{name:m.name,id:m.id,level:m.level,orderCount:orders.length,totalSpend:orders.reduce((s,o)=>s+netOf(o),0),avgSpend:orders.length?Math.round(orders.reduce((s,o)=>s+netOf(o),0)/orders.length):0};
  }).sort((a,b)=>b.totalSpend-a.totalSpend);
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="font-size:13px;margin:0">👥 ยอดซื้อตามสมาชิก</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'member\')">📤 Export</button></div>'+
    '<table><tr><th>ลูกค้า</th><th>ระดับ</th><th>ออเดอร์</th><th>ยอดซื้อรวม</th><th>เฉลี่ย/ครั้ง</th></tr>'+
    memberStats.map(m=>'<tr onclick="viewMemberDetail(\''+m.id+'\')" style="cursor:pointer"><td><strong>'+m.name+'</strong></td><td><span class="badge bg-'+(m.level==='VIP'?'pp':m.level==='Gold'?'am':'gr')+'">'+m.level+'</span></td><td>'+m.orderCount+'</td><td>'+thb(m.totalSpend)+'</td><td>'+thb(m.avgSpend)+'</td></tr>').join('')+'</table>';
}
function renderStaffReport(){
  const staffMap={};
  DB.orders.filter(o=>o.status!=='ยกเลิก').forEach(o=>{
    const by=o.by||'ไม่ระบุ';
    if(!staffMap[by]) staffMap[by]={name:by,orders:0,revenue:0};
    staffMap[by].orders++;staffMap[by].revenue+=netOf(o);
  });
  const staffs=Object.values(staffMap).sort((a,b)=>b.revenue-a.revenue);
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="font-size:13px;margin:0">👤 ผลงานพนักงาน</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'staff\')">📤 Export</button></div>'+
    '<table><tr><th>พนักงาน</th><th>จำนวนออเดอร์</th><th>ยอดขายรวม</th><th>เฉลี่ย/บิล</th></tr>'+
    staffs.map(s=>'<tr><td><strong>'+s.name+'</strong></td><td>'+s.orders+'</td><td>'+thb(s.revenue)+'</td><td>'+thb(s.orders?Math.round(s.revenue/s.orders):0)+'</td></tr>').join('')+'</table>';
}
function renderSKUReport(){
  const skuMap={};
  DB.orders.filter(o=>o.status!=='ยกเลิก').forEach(o=>{
    (o.items||[]).forEach(it=>{
      const key=it.c+' · '+it.t;
      if(!skuMap[key]) skuMap[key]={cat:it.c,type:it.t,qty:0,revenue:0,cost:0};
      skuMap[key].qty+=it.qty;skuMap[key].revenue+=it.p*it.qty;skuMap[key].cost+=it.k*it.qty;
    })
  });
  const skus=Object.values(skuMap).sort((a,b)=>b.revenue-a.revenue);
  if(!skus.length) return '<div class="empty-state"><div class="es-text">ยังไม่มีข้อมูล</div></div>';
  return '<div style="display:flex;justify-content:space-between;align-items:center"><div class="card-title" style="font-size:13px;margin:0">📊 แยกตาม SKU</div><button class="btn btn-out btn-sm" onclick="exportReportCSV(\'sku\')">📤 Export</button></div>'+
    '<table><tr><th>รายการ</th><th>จำนวน</th><th>รายได้</th><th>ต้นทุน</th><th>กำไร</th><th>Margin</th></tr>'+
    skus.map(s=>'<tr><td>'+s.cat+' · '+s.type+'</td><td>'+s.qty+'</td><td>'+thb(s.revenue)+'</td><td>'+thb(s.cost)+'</td><td style="color:var(--gn)">'+thb(s.revenue-s.cost)+'</td><td>'+Math.round((s.revenue-s.cost)/(s.revenue||1)*100)+'%</td></tr>').join('')+'</table>';
}

// ═══ EXPORT REPORT CSV ═══
function exportReportCSV(type){
  var csv='',filename='SAKKANID_report_'+type+'_'+todayStr().replace(/-/g,'')+'.csv';
  if(type==='sku'){
    const skuMap={};
    DB.orders.filter(o=>o.status!=='ยกเลิก').forEach(o=>{(o.items||[]).forEach(it=>{const k=it.c+'_'+it.t;if(!skuMap[k])skuMap[k]={cat:it.c,type:it.t,qty:0,rev:0,cost:0};skuMap[k].qty+=it.qty;skuMap[k].rev+=it.p*it.qty;skuMap[k].cost+=it.k*it.qty})});
    csv='หมวด,ประเภท,จำนวน,รายได้,ต้นทุน,กำไร,Margin%\n';
    Object.values(skuMap).forEach(s=>{csv+=s.cat+','+s.type+','+s.qty+','+s.rev+','+s.cost+','+(s.rev-s.cost)+','+Math.round((s.rev-s.cost)/(s.rev||1)*100)+'\n'});
  }else if(type==='unpaid'){
    csv='เลขออเดอร์,ลูกค้า,เบอร์โทร,ยอดสุทธิ,ชำระแล้ว,ค้างชำระ,วันที่\n';
    DB.orders.filter(o=>!isPaidCheck(o)&&o.status!=='ยกเลิก'&&!['เสร็จสิ้น','ปิดงาน'].includes(o.status)).forEach(o=>{csv+=o.id+','+o.mname+','+o.mphone+','+o.net+','+paidTotal(o)+','+remaining(o)+','+o.createdAt+'\n'});
  }else if(type==='member'){
    csv='ID,ชื่อ,ระดับ,จำนวนออเดอร์,ยอดซื้อรวม,เฉลี่ย/ครั้ง\n';
    DB.members.forEach(m=>{const ords=DB.orders.filter(o=>o.mid===m.id&&o.status!=='ยกเลิก');const tot=ords.reduce((s,o)=>s+netOf(o),0);csv+=m.id+','+m.name+','+m.level+','+ords.length+','+tot+','+(ords.length?Math.round(tot/ords.length):0)+'\n'});
  }else if(type==='staff'){
    csv='พนักงาน,จำนวนออเดอร์,ยอดขายรวม,เฉลี่ย/บิล\n';
    const sm={};DB.orders.filter(o=>o.status!=='ยกเลิก').forEach(o=>{const b=o.by||'-';if(!sm[b])sm[b]={n:b,c:0,r:0};sm[b].c++;sm[b].r+=netOf(o)});
    Object.values(sm).forEach(s=>{csv+=s.n+','+s.c+','+s.r+','+(s.c?Math.round(s.r/s.c):0)+'\n'});
  }else if(type==='daily'||type==='order'){
    csv='เลข,ลูกค้า,ประเภท,ยอด,ต้นทุน,ชำระ,สถานะ,โดย,วันที่\n';
    DB.orders.filter(o=>o.status!=='ยกเลิก').forEach(o=>{csv+=o.id+','+o.mname+','+o.type+','+o.net+','+(o.cost||0)+','+(isPaidCheck(o)?'ชำระแล้ว':'ค้าง')+','+o.status+','+o.by+','+o.createdAt+'\n'});
  }else if(type==='financial'){
    csv='รายการ,ยอด\n';var allO=DB.orders.filter(o=>o.status!=='ยกเลิก');
    csv+='รายรับ,'+allO.filter(o=>isPaidCheck(o)).reduce((s,o)=>s+netOf(o),0)+'\nต้นทุน,'+allO.reduce((s,o)=>s+(o.cost||0),0)+'\nค่าใช้จ่าย,'+(DB.expenses||[]).reduce((s,e)=>s+e.amount,0)+'\n';
  }else if(type==='quota'){
    csv='สมาชิก,Package,ใช้แล้ว,คงเหลือ,ซื้อเมื่อ,หมดอายุ\n';
    (DB.quotas||[]).forEach(q=>{var m=gM(q.mid);csv+=(m?m.name:q.mid)+','+q.pkgName+','+q.used+','+q.remain+','+q.buyDate+','+q.exp+'\n'});
  }else if(type==='cleaning'||type==='laundry'||type==='bedset'){
    csv='เลข,ลูกค้า,ประเภท,ยอด,สถานะ,วันที่\n';
    DB.orders.filter(o=>o.type===(type==='laundry'?'laundry':type)).forEach(o=>{csv+=o.id+','+o.mname+','+(o.items[0]?o.items[0].t:'')+','+o.net+','+o.status+','+o.createdAt+'\n'});
  }else if(type==='delivery'){
    csv='เลข,ลูกค้า,ที่อยู่,ค่าส่ง,ยอด,สถานะ\n';
    DB.orders.filter(o=>o.delivery==='delivery'&&o.status!=='ยกเลิก').forEach(o=>{csv+=o.id+','+o.mname+','+(o.deliveryAddr||'')+','+o.delCost+','+o.net+','+o.status+'\n'});
  }else if(type==='promo'){
    csv='โปร,ใช้(ครั้ง),ส่วนลดรวม,ยอดขายรวม\n';
    var pm2={};DB.orders.filter(o=>o.promo&&o.status!=='ยกเลิก').forEach(o=>{if(!pm2[o.promo])pm2[o.promo]={n:o.promo,c:0,d:0,r:0};pm2[o.promo].c++;pm2[o.promo].d+=(o.disc||0);pm2[o.promo].r+=netOf(o)});
    Object.values(pm2).forEach(p=>{csv+=p.n+','+p.c+','+p.d+','+p.r+'\n'});
  }else if(type==='top'||type==='monthly'){
    csv='ลูกค้า,ระดับ,ออเดอร์,ยอดซื้อ,แต้ม\n';
    DB.members.sort((a,b)=>b.spend-a.spend).forEach(m=>{csv+=m.name+','+m.level+','+(DB.orders.filter(o=>o.mid===m.id).length)+','+m.spend+','+m.pts+'\n'});
  }
  if(csv){
    const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=filename;a.click();
    toast('📤 Export '+type+' สำเร็จ');
  }
}

// ═══ PRICELIST PAGE ═══
function renderPricelistPage(c){
  c.innerHTML='<div class="tabs"><div class="tab act" onclick="showPriceTab(this,\'cat\')">👕 ซักรีด ('+CAT.length+')</div><div class="tab" onclick="showPriceTab(this,\'bed\')">🛏️ เครื่องนอน</div><div class="tab" onclick="showPriceTab(this,\'cln\')">🧹 ทำความสะอาด</div><div class="tab" onclick="showPriceTab(this,\'pkg\')">📦 Package</div></div>'+
  '<div class="card" id="priceContent"><div class="search-box" style="margin-bottom:12px"><input id="priceSearch" placeholder="ค้นหาบริการ..." oninput="filterPricelist()"></div><div id="priceList">'+renderPriceTable(CAT)+'</div></div>';
}
function showPriceTab(el,tab){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('act')});el.classList.add('act');
  var rc=$('priceContent');
  if(tab==='cat') rc.innerHTML='<div class="search-box" style="margin-bottom:12px"><input id="priceSearch" placeholder="ค้นหา..." oninput="filterPricelist()"></div><div id="priceList">'+renderPriceTable(CAT)+'</div>';
  else if(tab==='bed') rc.innerHTML=renderBedPriceTable();
  else if(tab==='cln') rc.innerHTML=renderClnPriceTable();
  else if(tab==='pkg') rc.innerHTML=renderPkgPriceTable();
}
function renderPriceTable(list){
  return '<table><tr><th>หมวด</th><th>ประเภท</th><th>ตัวเลือก</th><th>ราคา</th><th>ต้นทุน</th><th>กำไร</th><th></th></tr>'+
    list.map(function(it){var idx=CAT.indexOf(it);return '<tr><td>'+it.c+'</td><td>'+it.t+'</td><td>'+(it.o||'-')+'</td><td><strong>'+thb(it.p)+'</strong></td><td>'+thb(it.k)+'</td><td style="color:var(--gn)">'+thb(it.p-it.k)+'</td><td><button class="btn btn-out btn-sm" onclick="openPriceEdit('+idx+')">✏️</button></td></tr>'}).join('')+'</table>';
}
function renderBedPriceTable(){return '<table><tr><th>ขนาด</th><th>รายการ</th><th>ราคา</th><th>ต้นทุน</th><th>กำไร</th><th></th></tr>'+BED_SETS.map(function(b,i){return '<tr><td><strong>'+b.label+'</strong></td><td>'+b.items.join(', ')+'</td><td><strong>'+thb(b.price)+'</strong></td><td>'+thb(b.cost)+'</td><td style="color:var(--gn)">'+thb(b.price-b.cost)+'</td><td><button class="btn btn-out btn-sm" onclick="openSvcPriceEdit(\'bed\','+i+')">✏️</button></td></tr>'}).join('')+'</table>'}

function openSvcPriceEdit(type,i){
  var label='',price=0,cost=0,expDays=0;
  if(type==='bed'){label=BED_SETS[i].label;price=BED_SETS[i].price;cost=BED_SETS[i].cost}
  else if(type==='cln'){label=CLN_SVCS[i].label;price=CLN_SVCS[i].minPrice;cost=CLN_SVCS[i].cost}
  else if(type==='pkg'){label=PKGS[i].type+' '+PKGS[i].qty;price=PKGS[i].price;cost=PKGS[i].cost;expDays=PKGS[i].expDays}
  var h='<div class="modal-overlay show" id="moPE2"><div class="modal"><div class="modal-head"><h3>✏️ '+label+'</h3><button class="modal-close" onclick="document.getElementById(\'moPE2\').remove()">&times;</button></div><div class="modal-body"><div class="grid g2"><div class="form-group"><label class="form-label">ราคา (฿)</label><input id="sp-p" type="number" value="'+price+'"></div><div class="form-group"><label class="form-label">ต้นทุน (฿)</label><input id="sp-k" type="number" value="'+cost+'"></div></div>'+(type==='pkg'?'<div class="form-group"><label class="form-label">อายุ (วัน)</label><input id="sp-d" type="number" value="'+expDays+'"></div>':'')+'</div><div class="modal-foot"><button class="btn btn-out" onclick="document.getElementById(\'moPE2\').remove()">ยกเลิก</button><button class="btn btn-pr" onclick="saveSvcPrice(\''+type+'\','+i+')">💾 บันทึก</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
}
function saveSvcPrice(type,i){
  var p=parseFloat($('sp-p').value)||0,k=parseFloat($('sp-k').value)||0;
  if(type==='bed'){BED_SETS[i].price=p;BED_SETS[i].cost=k}
  else if(type==='cln'){CLN_SVCS[i].minPrice=p;CLN_SVCS[i].cost=k}
  else if(type==='pkg'){PKGS[i].price=p;PKGS[i].cost=k;PKGS[i].expDays=parseInt($('sp-d').value)||90}

}
function filterPricelist(){

  $('priceList').innerHTML=renderPriceTable(list);
}

// ═══ BACKUP / RESTORE ═══
function exportBackup(){
  const backup={_backup:{version:'4.0',app:'SAKKANID Laundry POS',exportDate:new Date().toISOString(),exportBy:curUser?curUser.nick:'',counts:{orders:DB.orders.length,members:DB.members.length,quotas:(DB.quotas||[]).length,promos:(DB.promos||[]).length}},...DB};
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='SAKKANID_backup_'+todayStr().replace(/-/g,'')+'.json';
  a.click();toast('Export Backup สำเร็จ ✅');
  logAction('EXPORT_DATA','Export backup');
}
function importBackupClick(){$('importFile').click()}
function importBackup(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data._backup||!data.orders){toast('ไม่ใช่ไฟล์ Backup ของ SAKKANID','err');return}
      const cnt=data._backup.counts||{};
      if(!confirm('จะ Import ข้อมูล:\n• ออเดอร์: '+(cnt.orders||0)+'\n• สมาชิก: '+(cnt.members||0)+'\n\n⚠️ ข้อมูลเดิมจะถูกทับ — ยืนยัน?')) return;
      // Auto-backup before import
      exportBackup();
      // Import
      DB=data;delete DB._backup;saveDB();
      logAction('IMPORT_DATA','Import backup');
      toast('Import สำเร็จ ✅ รีโหลดหน้า...');
      setTimeout(()=>location.reload(),1000);
    }catch(err){toast('ไฟล์ไม่ถูกต้อง: '+err.message,'err')}
  };reader.readAsText(file);
}

function confirmCancelOrder(oid){
  const o=gO(oid);if(!o) return;
  const reason=$('cancel-reason')?$('cancel-reason').value:'';
  o.status='ยกเลิก';o.cancelReason=reason;o.cancelDate=fmtDT();o.cancelBy=curUser.nick;
  // Handle refund
  if(isPaidCheck(o)&&$('cancel-refund')){
    const refType=$('cancel-refund').value;
    const refAmt=refType==='full'?paidTotal(o):refType==='partial'?(parseFloat($('cancel-amt').value)||0):0;
    if(refAmt>0){
      o.refund={amount:refAmt,reason,type:refType,method:'เงินสด',date:fmtDT(),by:curUser.nick};
      const m=gM(o.mid);if(m){m.spend=Math.max(0,(m.spend||0)-refAmt)}
    }
  }
  saveDB();logAction('CANCEL_ORDER',oid+' เหตุผล: '+reason);
  toast(oid+' ยกเลิกแล้ว','warn');
  const mo=$('moCancelOrder');if(mo) mo.remove();renderPage(curPage);
}

// ═══ SHIFT MANAGEMENT ═══
function getActiveShift(){return (DB.shifts||[]).find(s=>!s.closedAt)}
function openShift(){
  const active=getActiveShift();
  if(active){toast('กะยังเปิดอยู่ โดย '+active.openedBy,'warn');return}
  const cashStart=prompt('เงินสดเริ่มต้น (ทอน) ฿:','1000');
  if(cashStart===null) return;
  if(!DB.shifts) DB.shifts=[];
  DB.shifts.push({id:'SFT-'+String(DB.shifts.length+1).padStart(4,'0'),openedBy:curUser.nick,openedAt:fmtDT(),closedBy:'',closedAt:'',cashStart:parseFloat(cashStart)||0,cashEnd:0,systemCash:0,diff:0,totalSales:0,orderCount:0,note:''});
  saveDB();logAction('OPEN_SHIFT','เปิดกะ เงินสดเริ่ม '+thb(cashStart));
  toast('เปิดกะสำเร็จ ✅ เงินสดเริ่มต้น '+thb(cashStart));renderPage(curPage);
}
function closeShift(){
  const active=getActiveShift();
  if(!active){toast('ไม่มีกะที่เปิดอยู่','warn');return}
  const cashEnd=prompt('นับเงินสดจริง (฿):','');
  if(cashEnd===null) return;
  // Calculate system cash for this shift
  const shiftOrders=DB.orders.filter(o=>o.createdAt>=active.openedAt&&o.status!=='ยกเลิก');
  const cashPayments=shiftOrders.reduce((s,o)=>{
    return s+(o.payHist||[]).filter(p=>p.method==='เงินสด'&&p.date>=active.openedAt).reduce((ss,p)=>ss+p.amt,0);
  },0);
  active.closedBy=curUser.nick;active.closedAt=fmtDT();
  active.cashEnd=parseFloat(cashEnd)||0;
  active.systemCash=active.cashStart+cashPayments;
  active.diff=active.cashEnd-active.systemCash;
  active.totalSales=shiftOrders.reduce((s,o)=>s+netOf(o),0);
  active.orderCount=shiftOrders.length;
  saveDB();logAction('CLOSE_SHIFT','ปิดกะ เงินสดจริง '+thb(cashEnd)+' ระบบ '+thb(active.systemCash)+' ผลต่าง '+thb(active.diff));
  toast('ปิดกะสำเร็จ ✅ ผลต่าง: '+thb(active.diff)+(active.diff>=0?' (เกิน)':' (ขาด)'));
  renderPage(curPage);
}

function saveExpense(){
  var cat=$('exp-cat')?$('exp-cat').value:'';
  var name=$('exp-name')?$('exp-name').value.trim():'';
  var amt=parseFloat($('exp-amt')?$('exp-amt').value:0)||0;
  if(!name||!amt){toast('กรอกรายการและจำนวนเงิน','err');return}
  if(!DB.expenses) DB.expenses=[];
  DB.expenses.push({id:'EXP-'+String(DB.expenses.length+1).padStart(4,'0'),category:cat,name:name,amount:amt,date:fmtDT(),by:curUser.nick});
  saveDB();logAction('ADD_EXPENSE',name+' '+thb(amt));
  toast('บันทึกค่าใช้จ่าย ✅ '+thb(amt));renderExpensePage();
}

      h+='<div style="display:flex;justify-content:space-between;font-size:11px;padding:1px 0 1px 8px">';

    h+='<div style="font-size:10px;margin-top:4px;font-weight:700;color:#333">ประวัติชำระเงิน:</div>';

    });
  }
  // ── Points ──
  if(o.pts&&bc.showPoints!==false) h+='<div style="font-size:10px;margin-top:4px;color:#006F98">⭐ แต้มที่ได้รับ: +'+o.pts+' แต้ม</div>';

  if(o.type==='quota'&&o.mid){
    var mQuotas=(DB.quotas||[]).filter(function(q){return q.mid===o.mid&&q.remain>=0});
    if(mQuotas.length){
      h+='<div style="border-top:1px dashed #999;margin:4px 0"></div>';

      mQuotas.forEach(function(q){
        h+='<div style="font-size:10px;color:#666;text-align:center;margin-top:2px">'+q.pkgName+'</div>';
        h+='<div style="font-size:11px;text-align:center;font-weight:600">ใช้แล้ว '+q.used+' ชิ้น / คงเหลือ '+q.remain+' ชิ้น</div>';
      });
    }
  }
  // ── Promo used ──
  if(o.promo) h+='<div style="font-size:10px;margin-top:4px;color:#C4820A">🎁 โปร: '+o.promo+'</div>';
  // ── Note ──
  if(o.note) h+='<div style="font-size:10px;margin-top:4px;padding:3px 6px;background:#FEF3C7;border-radius:4px">📝 '+o.note+'</div>';

  h+='<div style="border-top:1px dashed #999;margin:6px 0"></div>';
  h+='<div style="text-align:center;font-size:10px;color:#999">'+(bc.footerText||s.billFooter||'ขอบคุณที่ใช้บริการค่ะ 🫧')+'</div>';
  if(bc.taxId) h+='<div style="text-align:center;font-size:9px;color:#999">เลขภาษี: '+bc.taxId+'</div>';
  h+='</div>';return h;
}

// ═══ KEYBOARD SHORTCUTS ═══
function initShortcuts(){
  document.addEventListener('keydown',function(e){
    if(!curUser) return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
    if(e.key==='F1'){e.preventDefault();navTo('laundry')}
    else if(e.key==='F2'){e.preventDefault();navTo('package')}
    else if(e.key==='F3'){e.preventDefault();navTo('orders')}
    else if(e.key==='F4'){e.preventDefault();navTo('dashboard')}
    else if(e.key==='F5'){e.preventDefault();renderPage(curPage);toast('🔄 Refresh')}
    else if(e.key==='?'&&e.shiftKey){showShortcutsHelp()}
    else if(e.key==='e'&&e.ctrlKey){e.preventDefault();renderExpensePage()}
  });
}

  var h='<div class="modal-overlay show" id="moShortcuts"><div class="modal"><div class="modal-head"><h3>⌨️ Keyboard Shortcuts</h3><button class="modal-close" onclick="document.getElementById(\'moShortcuts\').remove()">&times;</button></div>'+

loadDB();initDarkMode();initLockScreen();initShortcuts();initErrorHandler();
