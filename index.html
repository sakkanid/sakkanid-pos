<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SAKKANID Laundry POS</title>
<link rel="manifest" href="data:application/json,{}">
<meta name="theme-color" content="#006F98">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🫧</text></svg>">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js" defer></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" defer></script>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;600&display=swap');
:root{
--pr:#006F98;--prl:#D9F0FB;--pr2:#1ABBEF;--pr2l:#C5EDFB;
--gn:#0D8A6A;--gnl:#E0F5EF;--gnd:#076B52;
--am:#C4820A;--aml:#FEF3C7;--rd:#C92A2A;--rdl:#FEE2E2;
--pp:#5B5FD6;--ppl:#EEEEFF;
--bg:#F0F3F5;--wh:#FFFFFF;--b1:#DDE1E5;--b2:#C8CDD3;
--t1:#1A2A3A;--t2:#344250;--t3:#6B7A88;
--ff:'IBM Plex Sans Thai',sans-serif;--fm:'IBM Plex Mono',monospace;
--r:10px;--sh:0 2px 14px rgba(0,80,130,.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--ff);background:var(--bg);color:var(--t1);font-size:14px;line-height:1.5;overflow:hidden;height:100vh}
/* ═══ LOGIN ═══ */
#lockScreen{position:fixed;inset:0;z-index:9999;background:linear-gradient(135deg,#004E6B,#006F98 35%,#1ABBEF 70%,#7FD2FD 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff}
.lock-logo{font-size:42px;font-weight:800;margin-bottom:4px;text-shadow:0 2px 20px rgba(0,0,0,.2)}
.lock-sub{opacity:.7;font-size:14px;margin-bottom:32px}
.user-grid{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.user-btn{background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);border-radius:12px;padding:14px 20px;color:#fff;cursor:pointer;text-align:center;min-width:120px;transition:.2s}
.user-btn:hover,.user-btn.sel{background:rgba(255,255,255,.25);border-color:#fff;transform:scale(1.05)}
.user-btn .ub-name{font-weight:700;font-size:13px}.user-btn .ub-role{font-size:11px;opacity:.7}
.pin-area{text-align:center}
.pin-dots{display:flex;gap:10px;justify-content:center;margin:16px 0}
.pin-dot{width:16px;height:16px;border-radius:50%;border:2px solid rgba(255,255,255,.5);transition:.2s}
.pin-dot.filled{background:#fff;border-color:#fff}
.pin-pad{display:grid;grid-template-columns:repeat(3,72px);gap:8px;justify-content:center}
.pin-key{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:12px;height:52px;color:#fff;font-size:20px;font-weight:700;cursor:pointer;transition:.15s;font-family:var(--fm)}
.pin-key:hover{background:rgba(255,255,255,.25)}
.pin-key:active{transform:scale(.95)}
.pin-key.del{font-size:14px;font-weight:600}
.pin-msg{margin-top:14px;font-size:13px;min-height:20px}
/* ═══ APP SHELL ═══ */
#app{display:none;height:100vh;overflow:hidden}
.app-wrap{display:flex;height:100vh}
/* SIDEBAR */
.sidebar{width:220px;background:#003D55;color:#fff;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sb-logo{padding:16px 18px;font-size:20px;font-weight:800;border-bottom:1px solid rgba(255,255,255,.1);display:flex;align-items:center;gap:8px}
.sb-logo span{font-size:24px}
.sb-nav{flex:1;padding:8px}
.sb-item{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:8px;color:rgba(255,255,255,.7);cursor:pointer;font-size:13px;font-weight:500;transition:.15s;margin-bottom:2px}
.sb-item:hover{background:rgba(255,255,255,.1);color:#fff}
.sb-item.act{background:var(--pr);color:#fff;font-weight:700}
.sb-item .sb-icon{font-size:16px;width:22px;text-align:center}
.sb-item .sb-badge{margin-left:auto;background:var(--rd);color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:10px}
.sb-section{padding:6px 14px;font-size:10px;text-transform:uppercase;letter-spacing:1px;color:rgba(255,255,255,.35);margin-top:10px;font-weight:700}
.sb-footer{padding:12px 14px;border-top:1px solid rgba(255,255,255,.1);font-size:11px}
.sb-footer .sf-name{font-weight:600;color:rgba(255,255,255,.8)}.sb-footer .sf-role{color:rgba(255,255,255,.4);font-size:10px}
.sb-logout{margin-top:6px;background:rgba(255,255,255,.1);border:none;color:rgba(255,255,255,.6);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:11px;font-family:var(--ff);width:100%}
.sb-logout:hover{background:rgba(255,255,255,.2);color:#fff}
/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--wh);padding:12px 24px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--b1);flex-shrink:0}
.topbar-title{font-size:18px;font-weight:700;color:var(--t1)}
.topbar-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.content{flex:1;overflow-y:auto;padding:20px 24px}
/* ═══ COMPONENTS ═══ */
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:8px;border:none;font-family:var(--ff);font-size:13px;font-weight:600;cursor:pointer;transition:.15s}
.btn:hover{opacity:.9;transform:translateY(-1px)}.btn:active{transform:scale(.98)}
.btn-pr{background:var(--pr);color:#fff}.btn-gn{background:var(--gn);color:#fff}
.btn-am{background:var(--am);color:#fff}.btn-rd{background:var(--rd);color:#fff}
.btn-out{background:var(--wh);color:var(--pr);border:1.5px solid var(--pr)}
.btn-sm{padding:5px 10px;font-size:12px}.btn-lg{padding:10px 24px;font-size:15px}
.btn[disabled]{opacity:.4;cursor:not-allowed;transform:none}
.card{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:18px 20px;margin-bottom:14px}
.card-title{font-size:15px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600;white-space:nowrap}
.bg-pr{background:var(--prl);color:var(--pr)}.bg-gn{background:var(--gnl);color:var(--gnd)}
.bg-am{background:var(--aml);color:var(--am)}.bg-rd{background:var(--rdl);color:var(--rd)}
.bg-pp{background:var(--ppl);color:var(--pp)}.bg-gr{background:#F3F4F6;color:var(--t3)}
input,select,textarea{font-family:var(--ff);font-size:13px;padding:8px 12px;border:1.5px solid var(--b1);border-radius:8px;outline:none;transition:.15s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--pr);box-shadow:0 0 0 3px var(--prl)}
.form-group{margin-bottom:12px}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--t3);margin-bottom:4px}
.grid{display:grid;gap:12px}.g2{grid-template-columns:1fr 1fr}.g3{grid-template-columns:1fr 1fr 1fr}.g4{grid-template-columns:repeat(4,1fr)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--bg);color:var(--t3);font-weight:600;text-align:left;padding:8px 10px;border-bottom:2px solid var(--b1);font-size:11px;text-transform:uppercase}
td{padding:8px 10px;border-bottom:1px solid var(--b1);color:var(--t2);vertical-align:top}
tr:last-child td{border-bottom:none}
.kpi{background:linear-gradient(135deg,var(--prl),var(--wh));border:1px solid #B8E2F7;border-radius:var(--r);padding:14px;text-align:center}
.kpi-val{font-size:24px;font-weight:800;color:var(--pr);font-family:var(--fm)}.kpi-lbl{font-size:11px;color:var(--t3);font-weight:600;text-transform:uppercase}
/* ═══ MODAL ═══ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:1000;display:none;align-items:center;justify-content:center;padding:16px}
.modal-overlay.show{display:flex}
.modal{background:var(--wh);border-radius:14px;width:100%;max-width:600px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-lg{max-width:800px}
.modal-head{padding:16px 20px;border-bottom:1px solid var(--b1);display:flex;align-items:center;position:sticky;top:0;background:var(--wh);z-index:1;border-radius:14px 14px 0 0}
.modal-head h3{font-size:16px;font-weight:700;flex:1}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t3);padding:4px 8px;border-radius:6px}
.modal-close:hover{background:var(--bg)}
.modal-body{padding:20px}
.modal-foot{padding:14px 20px;border-top:1px solid var(--b1);display:flex;gap:8px;justify-content:flex-end;position:sticky;bottom:0;background:var(--wh);border-radius:0 0 14px 14px}
/* ═══ TOAST ═══ */
#toastBox{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 20px;border-radius:10px;color:#fff;font-size:13px;font-weight:600;animation:fadeIn .3s;box-shadow:0 4px 20px rgba(0,0,0,.15)}
.toast-ok{background:var(--gn)}.toast-err{background:var(--rd)}.toast-warn{background:var(--am)}.toast-info{background:var(--pr)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:none}}
/* ═══ ORDER CARD ═══ */
.o-card{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:14px 16px;margin-bottom:10px;border-left:4px solid var(--pr)}
.o-card.st-wash{border-left-color:var(--am)}.o-card.st-ready{border-left-color:var(--gn)}.o-card.st-ship{border-left-color:var(--pp)}.o-card.st-done{border-left-color:var(--b2)}.o-card.st-cancel{border-left-color:var(--rd)}
.o-head{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.o-id{font-family:var(--fm);font-weight:700;font-size:13px;color:var(--pr)}
.o-type{font-size:11px}.o-date{margin-left:auto;font-size:11px;color:var(--t3)}
.o-cust{font-size:13px;font-weight:600;margin-bottom:4px}.o-info{font-size:12px;color:var(--t3)}
.o-total{font-family:var(--fm);font-weight:700;font-size:15px;color:var(--t1);margin-top:6px}
.o-actions{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
/* ═══ STATUS FILTER ═══ */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1.5px solid var(--b1);background:var(--wh);color:var(--t3);transition:.15s}
.filter-chip:hover{border-color:var(--pr);color:var(--pr)}
.filter-chip.act{background:var(--pr);color:#fff;border-color:var(--pr)}
/* ═══ PRINT ═══ */
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
@media print{body *{visibility:hidden}#printArea,#printArea *{visibility:visible}#printArea{position:absolute;left:50%;top:0;transform:translateX(-50%);width:80mm;font-size:12px}#printArea.print-a4{width:190mm;font-size:13px}#printArea.print-a5{width:138mm;font-size:11px}@page{margin:10mm}}
/* ═══ RESPONSIVE ═══ */
@media(max-width:768px){
.sidebar{position:fixed;left:-260px;z-index:999;transition:.3s;width:260px;height:100vh}
.sidebar.open{left:0}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:998}
.sb-overlay.show{display:block}
.topbar .menu-btn{display:flex}
.g2,.g3,.g4{grid-template-columns:1fr}
.content{padding:14px}
}
@media(min-width:769px){.topbar .menu-btn{display:none}}
.menu-btn{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);padding:4px}
/* STATUS COLORS */
.st-tag{padding:3px 10px;border-radius:12px;font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:4px}
.st-tag.s-new{background:var(--prl);color:var(--pr)}.st-tag.s-wash{background:var(--aml);color:var(--am)}
.st-tag.s-ready{background:var(--gnl);color:var(--gnd)}.st-tag.s-ship{background:var(--ppl);color:var(--pp)}
.st-tag.s-done{background:var(--bg);color:var(--t3)}.st-tag.s-cancel{background:var(--rdl);color:var(--rd)}
.st-tag.s-book{background:#D9F0FB;color:#006F98}.st-tag.s-work{background:var(--rdl);color:var(--rd)}
.st-tag.s-unpaid{background:var(--rdl);color:var(--rd)}
.empty-state{text-align:center;padding:40px;color:var(--t3)}
.empty-state .es-icon{font-size:48px;margin-bottom:12px}.empty-state .es-text{font-size:14px}
/* ═══ DARK MODE ═══ */
body.dark{--bg:#0F1419;--wh:#1A2332;--b1:#2A3A4A;--b2:#3A4A5A;--t1:#E8EDF2;--t2:#B0BEC5;--t3:#78909C;--sh:0 2px 14px rgba(0,0,0,.3)}
body.dark .sidebar{background:#0A1929}
body.dark #lockScreen{background:linear-gradient(135deg,#0A1929,#003D55 35%,#005577 70%,#006F98 100%)}
body.dark .topbar{background:#1A2332;border-color:#2A3A4A}
body.dark .kpi{background:linear-gradient(135deg,#1A2838,#1A2332);border-color:#2A3A4A}
body.dark th{background:#151F2E}
body.dark input,body.dark select,body.dark textarea{background:#1A2332;border-color:#2A3A4A;color:#E8EDF2}
body.dark .modal{background:#1A2332}
body.dark .modal-head,.dark .modal-foot{background:#1A2332;border-color:#2A3A4A}
body.dark .filter-chip{background:#1A2332;border-color:#2A3A4A;color:#78909C}
body.dark .o-card{background:#1A2332}
body.dark .btn-out{background:#1A2332;color:var(--pr);border-color:#2A3A4A}
body.dark .tab{color:#78909C}body.dark .tab.act{background:#1A2332}
.search-box{position:relative}.search-box input{padding-left:36px}
select{-webkit-appearance:menulist;appearance:menulist;min-height:44px;font-size:14px!important}
input[type="date"],input[type="time"],input[type="number"]{min-height:44px;font-size:14px!important}
.search-box::before{content:'🔍';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px}
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:8px;padding:3px;margin-bottom:16px}
.tab{flex:1;padding:8px;text-align:center;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;color:var(--t3);transition:.15s}
.tab.act{background:var(--wh);color:var(--pr);box-shadow:0 1px 4px rgba(0,0,0,.08)}
.paid-box{padding:8px 12px;border-radius:8px;font-size:12px;font-weight:600;text-align:center;margin-top:8px}
.paid-box.yes{background:var(--gnl);color:var(--gnd)}.paid-box.no{background:var(--rdl);color:var(--rd)}
</style>
</head>
<body>

<!-- ═══ TOAST ═══ -->
<div id="toastBox"></div>

<!-- ═══ PRINT AREA ═══ -->
<div id="printArea" style="display:none"></div>

<!-- ═══ LOGIN SCREEN ═══ -->
<div id="lockScreen">
  <div class="lock-logo" id="lockLogo">🫧 SAKKANID</div>
  <div class="lock-sub" id="lockSub">Laundry POS System</div>
  <div id="userGrid" class="user-grid" style="max-height:300px;overflow-y:auto;flex-wrap:wrap;justify-content:center"></div>
  <div id="pinArea" class="pin-area" style="display:none">
    <div style="font-size:13px;opacity:.8;margin-bottom:4px" id="pinUser"></div>
    <div class="pin-dots" id="pinDots"></div>
    <div class="pin-pad" id="pinPad"></div>
    <div class="pin-msg" id="pinMsg"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">
  <div class="sb-overlay" id="sbOverlay" onclick="toggleSidebar()"></div>
  <div class="app-wrap">
    <!-- SIDEBAR -->
    <nav class="sidebar" id="sidebar">
      <div class="sb-logo"><span>🫧</span> SAKKANID</div>
      <div class="sb-nav" id="sbNav"></div>
      <div class="sb-footer">
        <div class="sf-name" id="sfName"></div>
        <div class="sf-role" id="sfRole"></div>
        <button class="sb-logout" onclick="doLogout()">🚪 ออกจากระบบ</button>
      </div>
    </nav>
    <!-- MAIN -->
    <div class="main">
      <div class="topbar">
        <button class="menu-btn" onclick="toggleSidebar()">☰</button>
        <div class="topbar-title" id="pageTitle">Dashboard</div>
        <div class="topbar-right">
          <div class="search-box" style="width:200px"><input id="globalSearchInput" placeholder="🔍 ค้นหาออเดอร์/สมาชิก..." onkeydown="if(event.key==='Enter')globalSearch(this.value)" style="font-size:12px;padding:6px 10px 6px 32px"></div>
          <span id="clockEl" style="font-family:var(--fm);font-size:12px;color:var(--t3)"></span>
          <span id="btnRefresh" onclick="refreshPage()" style="cursor:pointer;font-size:13px;padding:4px 8px;border-radius:6px;transition:background .2s" onmouseover="this.style.background='var(--b1)'" onmouseout="this.style.background=''" title="รีเฟรชข้อมูล">🔄</span>
          <span id="syncIndicator" style="cursor:pointer" onclick="openSyncPanel()"><span style="font-size:11px">☁️ Cloud</span></span>
        </div>
      </div>
      <div class="content" id="mainContent"></div>
    </div>
  </div>
</div>

<!-- ═══ MODAL CONTAINER ═══ -->
<div class="modal-overlay" id="moMember"><div class="modal" id="moMemberIn"></div></div>
<div class="modal-overlay" id="moNewMember"><div class="modal" id="moNewMemberIn"></div></div>
<div class="modal-overlay" id="moCreateOrder"><div class="modal modal-lg" id="moCreateOrderIn"></div></div>
<div class="modal-overlay" id="moAddItem"><div class="modal" id="moAddItemIn"></div></div>
<div class="modal-overlay" id="moPay"><div class="modal" id="moPayIn"></div></div>
<div class="modal-overlay" id="moBill"><div class="modal" id="moBillIn"></div></div>
<div class="modal-overlay" id="moDetail"><div class="modal modal-lg" id="moDetailIn"></div></div>
<div class="modal-overlay" id="moBuyPkg"><div class="modal" id="moBuyPkgIn"></div></div>
<div class="modal-overlay" id="moUseQuota"><div class="modal modal-lg" id="moUseQuotaIn"></div></div>
<div class="modal-overlay" id="moBedset"><div class="modal" id="moBedsetIn"></div></div>
<div class="modal-overlay" id="moCleaning"><div class="modal" id="moCleaningIn"></div></div>
<div class="modal-overlay" id="moEditOrder"><div class="modal modal-lg" id="moEditOrderIn"></div></div>

<script>
/* ═══════════════════════════════════════════════════

// ═══ CONSTANTS ═══

];

const STATUSES_LDR=['รับผ้ารอส่งซัก','ระหว่างการซัก','ผ้าพร้อมส่ง (รับเอง)','ผ้าพร้อมส่ง (Delivery)','จัดส่งแล้ว','เสร็จสิ้น','ยกเลิก'];

const BED_SETS=[

function formatBillDate(dt){
  if(!dt) return formatBillDate(new Date().toISOString());
  try{
    var d;
    // Already formatted dd/mm/yyyy — parse it
    if(typeof dt==='string'&&dt.match(/^\d{2}\/\d{2}\/\d{4}/)){
      var parts=dt.split(/[\/ :]/);
      var yr=parseInt(parts[2]);
      if(yr>2500) yr=yr-543; // Convert Buddhist to CE
      var timePart=parts[3]?parts[3]+':'+parts[4]:'';
      return parts[0]+'/'+parts[1]+'/'+yr+(timePart?' '+timePart+' น.':'');
    }
    // ISO or other format
    d=new Date(dt);if(isNaN(d)) return dt;
    var dd=String(d.getDate()).padStart(2,'0');
    var mm=String(d.getMonth()+1).padStart(2,'0');
    var yy=d.getFullYear(); // CE year (ค.ศ.)
    var hh=String(d.getHours()).padStart(2,'0');
    var mi=String(d.getMinutes()).padStart(2,'0');
    return dd+'/'+mm+'/'+yy+' '+hh+':'+mi+' น.';
  }catch(e){return dt}
}

function getStClass(st){
  if(st.includes('รับผ้า')||st==='รับจอง') return 's-new';
  if(st.includes('ระหว่างการซัก')||st==='ยืนยันนัด') return 's-wash';
  if(st.includes('พร้อมส่ง')) return 's-ready';
  if(st.includes('จัดส่ง')||st==='กำลังดำเนินการ') return 's-ship';
  if(st.includes('เสร็จสิ้น')||st==='ปิดงาน') return 's-done';
  if(st==='ยกเลิก') return 's-cancel';
  if(st.includes('รอชำระ')) return 's-unpaid';
  return 's-new';
}
function getOCardClass(st){
  if(st.includes('ระหว่าง')||st==='ยืนยันนัด') return 'st-wash';
  if(st.includes('พร้อมส่ง')) return 'st-ready';
  if(st.includes('จัดส่ง')||st.includes('Delivery')) return 'st-ship';
  if(st.includes('เสร็จสิ้น')||st==='ปิดงาน') return 'st-done';
  if(st==='ยกเลิก') return 'st-cancel';
  return '';
}
function netOf(o){return Math.max(0,(o.net||0))}
function paidTotal(o){return (o.payHist||[]).reduce((s,p)=>s+p.amt,0)}
function isPaidCheck(o){return paidTotal(o)>=netOf(o)}

function renderPinPad(){
  let h='';

  h+='<button class="pin-key del" onclick="padPress(\'clear\')">ล้าง</button>';

  h+='<button class="pin-key del" onclick="padPress(\'del\')">⌫</button>';
  $('pinPad').innerHTML=h;
}
function padPress(k){
  if(k==='clear'){pinStr='';renderPinDots();$('pinMsg').textContent='';return}
  if(k==='del'){pinStr=pinStr.slice(0,-1);renderPinDots();return}
  if(pinStr.length>=4) return;
  pinStr+=k;renderPinDots();
  if(pinStr.length===4) checkPin();
}
function checkPin(){
  if(selUserIdx===null) return;
  if(pinStr===USERS[selUserIdx].pin){
    curUser=USERS[selUserIdx];

    initApp();

    $('pinMsg').innerHTML='<span style="color:#FF6B6B">❌ PIN ไม่ถูกต้อง</span>';
    pinStr='';setTimeout(renderPinDots,300);
  }
}

    // JSONP — send data via script tag (no CORS)
    var cbName='_regcb_'+Date.now();
    var dataStr=encodeURIComponent(JSON.stringify(memberData));
    window[cbName]=function(result){
      delete window[cbName];
      if(result&&result.ok) showRegSuccess(name,phone,result.memberId||'');
      else showRegSuccess(name,phone,'');
    };
    var sc=document.createElement('script');
    sc.src=apiUrl+'?action=registerMember&callback='+cbName+'&data='+dataStr;
    sc.onerror=function(){delete window[cbName];showRegSuccess(name,phone,'')};
    document.head.appendChild(sc);
    setTimeout(function(){if(window[cbName]){delete window[cbName];showRegSuccess(name,phone,'')}},10000);
  }else{
    // No API URL — show error
    showRegSuccess(name,phone,'');
  }
}

function prCopyMsg(){
  var lineOA=window._regLineOA||'';
  var msg=window._regMsg||'';

}
function prCopyText(){
  var msg=window._regMsg||'';

function selectMember(mid){
  const m=gM(mid);if(!m) return;

function calcOrderTotal(){
  const itemsTotal=orderItems.reduce((s,it)=>s+it.p*it.qty,0);
  const extrasTotal=orderExtras.reduce((s,e)=>s+e.price,0);
  var disc=parseFloat($('co-disc')?$('co-disc').value:0)||0;
  // Apply promo
  var promoIdx=$('co-promo')?$('co-promo').value:'';
  var promoDisc=0;var promoLabel='';
  if(promoIdx!==''){
    var promos=getActivePromos();var promo=promos[parseInt(promoIdx)];
    if(promo){
      promoLabel=promo.name;
      var base=itemsTotal+extrasTotal;
      if(promo.type==='percent') promoDisc=Math.round(base*promo.value/100);
      else if(promo.type==='fixed'||promo.type==='points') promoDisc=promo.value;
    }
  }
  const isDel=$('co-delivery')&&$('co-delivery').value==='delivery';
  const delCost=isDel?parseFloat($('co-del-sel')?$('co-del-sel').value:0)||0:0;
  const net=Math.max(0,itemsTotal+extrasTotal-disc-promoDisc+delCost);
  var display='ยอดสุทธิ: '+thb(net);
  if(promoDisc>0) display+='<div style="font-size:12px;color:var(--am)">🎁 '+promoLabel+' ลด '+thb(promoDisc)+'</div>';
  if($('co-total-box')) $('co-total-box').innerHTML=display;
  // Auto-fill pay amount
  if($('co-payamt')&&!$('co-payamt').dataset.edited) $('co-payamt').value=net;
}

// ═══ SAVE ORDER ═══
function saveOrder(){
  if(!orderItems.length){toast('กรุณาเพิ่มรายการซักอย่างน้อย 1 รายการ','err');return}
  const m=gM(orderMemberId);if(!m){toast('ไม่พบข้อมูลลูกค้า','err');return}
  const isDel=$('co-delivery').value==='delivery';
  const delCost=isDel?parseFloat($('co-del-sel').value)||0:0;
  var disc=parseFloat($('co-disc').value)||0;
  // Apply promo
  var promoName='';
  const promoIdx=$('co-promo')?$('co-promo').value:'';
  if(promoIdx!==''){
    const promos=getActivePromos();const promo=promos[parseInt(promoIdx)];
    if(promo){
      promoName=promo.name;
      const itemsT=orderItems.reduce((s,it)=>s+it.p*it.qty,0)+orderExtras.reduce((s,e)=>s+e.price,0);
      if(promo.type==='percent') disc+=Math.round(itemsT*promo.value/100);
      else if(promo.type==='fixed'||promo.type==='points') disc+=promo.value;
      if(promo.type==='points'&&promo.ptsNeeded){m.pts=Math.max(0,(m.pts||0)-promo.ptsNeeded)}
    }
  }
  const itemsTotal=orderItems.reduce((s,it)=>s+it.p*it.qty,0);
  const extrasTotal=orderExtras.reduce((s,e)=>s+e.price,0);
  const net=Math.max(0,itemsTotal+extrasTotal-disc+delCost);
  const cost=orderItems.reduce((s,it)=>s+it.k*it.qty,0);
  const paidNow=$('co-paid').value==='1';
  var payAmt=paidNow?(parseFloat($('co-payamt')?$('co-payamt').value:0)||net):0;
  var payDate=paidNow?fmtDate(new Date($('co-paydate')?$('co-paydate').value:new Date())):'';
  var payTime=paidNow?($('co-paytime')?$('co-paytime').value:''):'';
  var payDateStr=payDate+(payTime?' '+payTime:'');
  const payHist=paidNow?[{round:1,method:$('co-method')?$('co-method').value:'เงินสด',amt:payAmt,date:payDateStr,by:curUser.nick}]:[];
  const order={
    id:genId('LDR'),type:'laundry',mid:m.id,mname:m.name,mphone:m.phone,
    status:'รับผ้ารอส่งซัก',delivery:isDel?'delivery':'pickup',
    delCost:delCost,deliveryAddr:isDel?($('co-addr')?$('co-addr').value.trim():''):'',
    items:[...orderItems],extras:[...orderExtras],disc:disc,net:net,cost:cost,
    payHist:payHist,isPaid:paidNow&&payAmt>=net,pts:pts4(net),
    promo:promoName,note:$('co-note')?$('co-note').value.trim():'',
    pickupDate:$('co-pickup')?$('co-pickup').value:'',
    createdAt:fmtDT(),by:curUser.nick
  };
  DB.orders.push(order);
  if(order.isPaid){m.spend=(m.spend||0)+net;m.pts=(m.pts||0)+order.pts}
  saveDB();
  logAction('CREATE_ORDER',order.id+' '+thb(net)+(promoName?' โปร:'+promoName:''));
  toast('สร้างออเดอร์สำเร็จ ✅ '+order.id);
  closeMo('moCreateOrder');navTo('orders');
}

// ═══ STATUS CHANGE ═══
function advanceStatus(oid){
  const o=gO(oid);if(!o) return;
  const statuses=o.type==='cleaning'?STATUSES_CLN:STATUSES_LDR;
  const idx=statuses.indexOf(o.status);
  if(idx<0||idx>=statuses.length-2) return;
  var nextSt=statuses[idx+1];
  // ต้องชำระก่อนเปลี่ยนเป็น "เสร็จสิ้น" หรือ "ปิดงาน" เท่านั้น
  if((nextSt==='เสร็จสิ้น'||nextSt==='ปิดงาน')&&!isPaidCheck(o)){
    toast('⚠️ ต้องชำระเงินให้ครบก่อนเปลี่ยนเป็น "'+nextSt+'"','err');return;
  }
  // Cleaning: ถ้าชำระแล้วและ next คือ "เสร็จสิ้น รอชำระ" → ข้ามไป "ปิดงาน"
  if(o.type==='cleaning'&&nextSt==='เสร็จสิ้น รอชำระ'&&isPaidCheck(o)){
    nextSt='ปิดงาน';
  }
  o.status=nextSt;saveDB();
  logAction('CHANGE_STATUS',oid+' → '+nextSt);
  toast(oid+' → '+nextSt);renderPage(curPage);
}

function doPrint(oid){
  const billEl=$('moBillIn').querySelector('.modal-body');
  if(!billEl) return;
  var pa=$('printArea');pa.innerHTML=billEl.innerHTML;
  // Detect paper size from content
  var content=billEl.innerHTML;
  if(content.includes('width:210mm')) pa.className='print-a4';
  else if(content.includes('width:148mm')) pa.className='print-a5';
  else pa.className='';
  pa.style.display='block';
  window.print();
  setTimeout(()=>{pa.style.display='none';pa.className=''},500);
}
function saveBillImage(oid){
  var billEl=$('moBillIn').querySelector('.modal-body');
  if(!billEl){toast('ไม่พบบิล','err');return}
  if(typeof html2canvas==='undefined'){toast('กำลังโหลด... ลองกดอีกครั้ง','warn');return}
  toast('📸 กำลังบันทึกรูปบิล...','info');
  html2canvas(billEl,{scale:2,backgroundColor:'#ffffff',useCORS:true}).then(function(canvas){
    var link=document.createElement('a');
    link.download='SAKKANID_bill_'+oid+'_'+todayStr().replace(/-/g,'')+'.png';
    link.href=canvas.toDataURL('image/png');
    link.click();
    toast('📸 บันทึกรูปบิลสำเร็จ ✅');
  }).catch(function(e){toast('❌ บันทึกรูปล้มเหลว: '+e.message,'err')});
}

function docTypeChange(){
  var t=$('doc-type')?$('doc-type').value:'receipt';
  var show=t==='taxinv'||t==='quotation';
  if($('doc-vat-section'))$('doc-vat-section').style.display=show?'block':(t==='invoice'?'block':'none');
}
function docWhtChange(oid){
  var o=gO(oid);if(!o) return;
  var sel=$('doc-wht')?$('doc-wht').value:'0';
  if($('doc-wht-custom'))$('doc-wht-custom').style.display=sel==='custom'?'block':'none';
  var rate=sel==='custom'?(parseFloat($('doc-wht-rate')?$('doc-wht-rate').value:0)||0):parseFloat(sel)||0;
  var whtAmt=Math.round(o.net*rate/100);
  if($('doc-wht-preview')){
    $('doc-wht-preview').style.display=rate>0?'block':'none';
    $('doc-wht-preview').innerHTML='หัก ณ ที่จ่าย '+rate+'%: <strong style="color:var(--rd)">-'+thb(whtAmt)+'</strong><br>ยอดชำระหลังหัก: <strong>'+thb(o.net-whtAmt)+'</strong>';
  }
}
function generateDocument(oid){
  var o=gO(oid);if(!o) return;
  var s=getShopSettings();var bc=s.billConfig||{};
  var dtype=$('doc-type')?$('doc-type').value:'receipt';
  var dt=DOC_TYPES[dtype];
  var cname=$('doc-cname')?$('doc-cname').value.trim():'';
  var taxid=$('doc-taxid')?$('doc-taxid').value.trim():'';
  var addr=$('doc-addr')?$('doc-addr').value.trim():'';
  var phone=$('doc-phone')?$('doc-phone').value.trim():'';
  var branch=$('doc-branch')?$('doc-branch').value.trim():'';
  var remark=$('doc-remark')?$('doc-remark').value.trim():'';
  var vatMode=$('doc-vat')?$('doc-vat').value:'none';
  var net=o.net;var baseAmt=net;var vatAmt=0;var grandTotal=net;
  if(vatMode==='include'){baseAmt=Math.round(net/1.07);vatAmt=net-baseAmt;grandTotal=net}
  else if(vatMode==='exclude'){vatAmt=Math.round(net*0.07);grandTotal=net+vatAmt}
  // Withholding tax
  var whtSel=$('doc-wht')?$('doc-wht').value:'0';
  var whtRate=whtSel==='custom'?(parseFloat($('doc-wht-rate')?$('doc-wht-rate').value:0)||0):parseFloat(whtSel)||0;
  var whtAmt=Math.round(net*whtRate/100);
  var netPayable=grandTotal-whtAmt;
  // Generate document number
  var customNum=$('doc-num')?$('doc-num').value.trim():'';
  var docNum=customNum||dt.prefix+'-'+o.id.replace(/[A-Z]+-/,'')+'-'+String(new Date().getFullYear()+543).slice(-2);
  var paperSize=$('doc-paper')?$('doc-paper').value:'A4';
  var pw=paperSize==='A5'?'148mm':'210mm';
  var pfs=paperSize==='A5'?'11px':'13px';
  // Build document HTML
  var fs=bc.fontSize||12;var fw=bc.fontWeight||600;
  var h='<div style="width:'+pw+';max-width:100%;font-family:var(--ff);font-size:'+pfs+';padding:'+(paperSize==='A5'?'16px':'24px')+';color:#000;background:#fff;font-weight:'+fw+'">';
  // Header
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px">';
  h+='<div>'+(s.logo?'<img src="'+s.logo+'" style="height:50px;margin-bottom:4px"><br>':'')+'<div style="font-size:18px;font-weight:800">'+s.shopName+'</div>';
  h+='<div style="font-size:11px;color:#666">'+(s.address||'')+'<br>'+(s.phone||'')+' · '+(s.lineOA||'')+'</div>';
  if(bc.taxId) h+='<div style="font-size:11px;color:#666">เลขประจำตัวผู้เสียภาษี: '+bc.taxId+'</div>';
  h+='</div>';
  h+='<div style="text-align:right"><div style="font-size:18px;font-weight:800;color:'+dt.color+'">'+dt.name+'</div><div style="font-size:12px;color:#666">'+dt.en+'</div>';
  h+='<div style="font-size:13px;margin-top:6px"><strong>เลขที่:</strong> '+docNum+'</div>';
  h+='<div style="font-size:12px"><strong>วันที่:</strong> '+formatBillDate(o.createdAt)+'</div>';
  h+='</div></div>';
  // Customer info
  h+='<div style="border:1px solid #ddd;border-radius:8px;padding:12px;margin-bottom:14px;font-size:12px">';
  h+='<div style="font-weight:700;margin-bottom:4px">ข้อมูลลูกค้า</div>';
  if(cname) h+='<div><strong>ชื่อ:</strong> '+cname+'</div>';
  if(taxid) h+='<div><strong>เลขประจำตัวผู้เสียภาษี:</strong> '+taxid+(branch?' สาขา: '+branch:'')+'</div>';
  if(addr) h+='<div><strong>ที่อยู่:</strong> '+addr+'</div>';
  if(phone) h+='<div><strong>โทร:</strong> '+phone+'</div>';
  h+='</div>';
  // Items table
  h+='<table style="width:100%;border-collapse:collapse;font-size:12px;margin-bottom:14px"><tr style="background:#f0f0f0"><th style="text-align:left;padding:6px;border:1px solid #ddd">ลำดับ</th><th style="text-align:left;padding:6px;border:1px solid #ddd">รายการ</th><th style="text-align:center;padding:6px;border:1px solid #ddd">จำนวน</th><th style="text-align:right;padding:6px;border:1px solid #ddd">ราคา/หน่วย</th><th style="text-align:right;padding:6px;border:1px solid #ddd">จำนวนเงิน</th></tr>';
  var num=1;
  (o.items||[]).forEach(function(it){
    var itemName='ค่าบริการ'+(it.c?' '+it.c:'')+' — '+it.t+(it.o?' · '+it.o:'');
    var itemEn=it.te?(it.te+(it.oe?' '+it.oe:'')):'';
    h+='<tr><td style="padding:6px;border:1px solid #ddd;text-align:center">'+num+'</td><td style="padding:6px;border:1px solid #ddd">'+itemName+(itemEn?'<br><span style="font-size:10px;color:#999">'+itemEn+'</span>':'')+'</td><td style="padding:6px;border:1px solid #ddd;text-align:center">'+it.qty+'</td><td style="padding:6px;border:1px solid #ddd;text-align:right">'+thb(it.p)+'</td><td style="padding:6px;border:1px solid #ddd;text-align:right">'+thb(it.p*it.qty)+'</td></tr>';
    num++;
  });
  (o.extras||[]).forEach(function(e){
    h+='<tr><td style="padding:6px;border:1px solid #ddd;text-align:center">'+num+'</td><td style="padding:6px;border:1px solid #ddd">'+e.name+' (บริการเพิ่มเติม)</td><td style="padding:6px;border:1px solid #ddd;text-align:center">1</td><td style="padding:6px;border:1px solid #ddd;text-align:right">'+thb(e.price)+'</td><td style="padding:6px;border:1px solid #ddd;text-align:right">'+thb(e.price)+'</td></tr>';
    num++;
  });
  h+='</table>';
  // Summary
  h+='<div style="display:flex;justify-content:flex-end"><div style="width:250px">';
  if(o.disc) h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>ส่วนลด</span><span style="color:red">-'+thb(o.disc)+'</span></div>';
  if(o.delCost) h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>ค่าจัดส่ง</span><span>'+thb(o.delCost)+'</span></div>';
  if(vatMode!=='none'){
    h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>ราคาก่อน VAT</span><span>'+thb(baseAmt)+'</span></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0"><span>VAT 7%</span><span>'+thb(vatAmt)+'</span></div>';
  }
  h+='<div style="display:flex;justify-content:space-between;font-size:15px;font-weight:800;padding:6px 0;border-top:2px solid #333;margin-top:4px"><span>ยอดรวมทั้งสิ้น</span><span>'+thb(grandTotal)+'</span></div>';
  if(whtRate>0){
    h+='<div style="display:flex;justify-content:space-between;font-size:12px;padding:3px 0;color:#C92A2A"><span>หัก ณ ที่จ่าย '+whtRate+'%</span><span>-'+thb(whtAmt)+'</span></div>';
    h+='<div style="display:flex;justify-content:space-between;font-size:14px;font-weight:800;padding:6px 0;border-top:1px solid #999"><span>ยอดชำระสุทธิ</span><span>'+thb(netPayable)+'</span></div>';
  }
  h+='</div></div>';
  // Payment status
  if(dtype==='receipt'){
    h+='<div style="margin-top:12px;padding:8px;background:#E0F5EF;border-radius:6px;text-align:center;font-size:12px;color:#0D8A6A;font-weight:700">✅ ชำระเงินเรียบร้อยแล้ว — '+(o.payHist&&o.payHist.length?(o.payHist.map(function(p){return p.method}).join(', ')):'')+'</div>';
  }else if(dtype==='invoice'||dtype==='quotation'){
    h+='<div style="margin-top:12px;padding:8px;background:#FEF3C7;border-radius:6px;text-align:center;font-size:12px;color:#92400E;font-weight:700">'+(dtype==='quotation'?'💰 ใบเสนอราคามีอายุ 30 วัน':'📨 กรุณาชำระภายใน 7 วัน')+'</div>';
  }
  if(remark) h+='<div style="margin-top:8px;font-size:11px;color:#666"><strong>หมายเหตุ:</strong> '+remark+'</div>';
  // Footer
  h+='<div style="margin-top:20px;display:flex;justify-content:space-between;font-size:11px;color:#999"><div>'+s.shopName+' · '+(s.phone||'')+'</div><div>'+dt.name+' เลขที่ '+docNum+'</div></div>';
  if(bc.footerImage) h+='<div style="text-align:center;margin-top:8px"><img src="'+bc.footerImage+'" style="max-height:40px"></div>';
  h+='</div>';
  // Display in bill modal
  $('moBillIn').innerHTML=
    '<div class="modal-head"><h3>📄 '+dt.name+' — '+docNum+'</h3><button class="modal-close" onclick="closeMo(\'moBill\')">&times;</button></div>'+
    '<div class="modal-body" style="display:flex;justify-content:center;overflow-y:auto">'+h+'</div>'+
    '<div class="modal-foot" style="flex-wrap:wrap;gap:4px"><button class="btn btn-out" onclick="closeMo(\'moBill\')">ปิด</button><button class="btn btn-out" onclick="saveBillImage(\''+docNum+'\')">📸 บันทึกรูป</button><button class="btn btn-pr" onclick="doPrint(\''+docNum+'\')">🖨️ พิมพ์</button></div>';
  // Remove doc modal
  var docMo=$('moDoc');if(docMo) docMo.remove();
  // Save to document history
  if(!DB.docHistory) DB.docHistory=[];
  DB.docHistory.push({docNum:docNum,docType:dtype,typeName:dt.name,orderId:oid,customer:cname,taxId:taxid,net:o.net,grandTotal:grandTotal,whtRate:whtRate,whtAmt:whtAmt,vatMode:vatMode,vatAmt:vatAmt,paperSize:paperSize,createdAt:fmtDT(),by:curUser?curUser.nick:''});
  saveDB();
  toast('📄 สร้าง'+dt.name+'สำเร็จ ✅');
}

function editDeliveryChange(){
  var isDel=$('eo-delivery')&&$('eo-delivery').value==='delivery';
  if($('eo-del-tier')) $('eo-del-tier').style.display=isDel?'block':'none';

function eoPromoChange(){
  var o=gO(editOid);if(!o) return;
  var pi=$('eo-promo')?$('eo-promo').value:'';
  if(pi!==''){
    var promos=getActivePromos();var pr=promos[parseInt(pi)];
    if(pr){
      var itemsT=(o.items||[]).reduce(function(s,it){return s+it.p*it.qty},0)+editExtras.reduce(function(s,e){return s+e.price},0);
      var promoDisc=pr.type==='percent'?Math.round(itemsT*pr.value/100):pr.value;
      if($('eo-disc'))$('eo-disc').value=promoDisc;
    }
  }
  $('eo-total-box').innerHTML=calcEditTotalDisplay(o);
}
function eoRecalc(){var o=gO(editOid);if(o)$('eo-total-box').innerHTML=calcEditTotalDisplay(o)}
function calcEditTotalDisplay(o){
  var itemsTotal=(o.items||[]).reduce(function(s,it){return s+it.p*it.qty},0);
  var extrasTotal=editExtras.reduce(function(s,e){return s+e.price},0);
  var disc=parseFloat($('eo-disc')?$('eo-disc').value:o.disc)||0;
  var isDel=$('eo-delivery')?$('eo-delivery').value==='delivery':o.delivery==='delivery';
  var delCost=isDel?parseFloat($('eo-del-sel')?$('eo-del-sel').value:o.delCost)||0:0;
  var net=Math.max(0,itemsTotal+extrasTotal-disc+delCost);
  var paid=paidTotal(o);
  var newRemaining=Math.max(0,net-paid);
  var result='ยอดสุทธิ: '+thb(net);
  if(paid>0&&net>o.net){
    result+='<div style="font-size:12px;color:var(--rd);margin-top:4px">⚠️ ยอดเพิ่มขึ้น '+thb(net-o.net)+' → ต้องเก็บเพิ่ม '+thb(newRemaining)+'</div>';
  }else if(paid>0&&paid>=net){
    result+='<div style="font-size:12px;color:var(--gn);margin-top:4px">✅ ชำระครบแล้ว (จ่ายไป '+thb(paid)+')</div>';
  }
  return result;
}
function saveEditOrder(){
  const o=gO(editOid);if(!o) return;
  o.extras=[...editExtras];
  o.disc=parseFloat($('eo-disc').value)||0;
  // Save promo
  var epi=$('eo-promo')?$('eo-promo').value:'';
  if(epi!==''){var eps=getActivePromos();var epr=eps[parseInt(epi)];if(epr)o.promo=epr.name}else{o.promo=''}
  o.note=$('eo-note')?$('eo-note').value.trim():'';
  o.pickupDate=$('eo-pickup')?$('eo-pickup').value:'';
  if($('eo-delivery')){
    o.delivery=$('eo-delivery').value;
    o.delCost=o.delivery==='delivery'?parseFloat($('eo-del-sel')?$('eo-del-sel').value:0)||0:0;
    o.deliveryAddr=o.delivery==='delivery'?($('eo-addr')?$('eo-addr').value.trim():''):'';
  }
  const itemsTotal=(o.items||[]).reduce(function(s,it){return s+it.p*it.qty},0);
  const extrasTotal=o.extras.reduce(function(s,e){return s+e.price},0);
  o.net=Math.max(0,itemsTotal+extrasTotal-o.disc+(o.delCost||0));
  o.cost=(o.items||[]).reduce(function(s,it){return s+it.k*it.qty},0);
  o.isPaid=isPaidCheck(o);
  saveDB();logAction('EDIT_ORDER',editOid+' ยอดใหม่: '+thb(o.net));
  toast('แก้ไขสำเร็จ ✅ ยอด: '+thb(o.net));closeMo('moEditOrder');renderPage(curPage);
}

function saveBuyPackage(){
  const m=gM(pkgMemberId);if(!m) return;
  const idx=parseInt($('bp-pkg').value);const pkg=PKGS[idx];if(!pkg) return;
  const method=$('bp-method').value;
  var payDt=fmtDate(new Date($('bp-paydate')?$('bp-paydate').value:new Date()));
  var payTm=$('bp-paytime')?$('bp-paytime').value:'';
  var payDateStr=payDt+(payTm?' '+payTm:'');
  // Promo
  var disc=0;var promoName='';
  var pi=$('bp-promo')?$('bp-promo').value:'';
  if(pi!==''){var ps=getActivePromos();var pr=ps[parseInt(pi)];if(pr){promoName=pr.name;if(pr.type==='percent')disc=Math.round(pkg.price*pr.value/100);else if(pr.type==='fixed'||pr.type==='points')disc=pr.value;if(pr.type==='points'&&pr.ptsNeeded)m.pts=Math.max(0,(m.pts||0)-pr.ptsNeeded)}}
  var netPrice=Math.max(0,pkg.price-disc);
  const expDate=new Date();expDate.setDate(expDate.getDate()+pkg.expDays);
  const quota={id:genId('QTA'),mid:m.id,pkgName:pkg.type+' '+pkg.qty+' ชิ้น',pkgType:pkg.type,total:pkg.qty,used:0,remain:pkg.qty,buyDate:fmtDate(),exp:fmtDate(expDate)};
  if(!DB.quotas) DB.quotas=[];
  DB.quotas.push(quota);
  const order={id:genId('PKB'),type:'pkg_buy',mid:m.id,mname:m.name,mphone:m.phone,status:'เสร็จสิ้น',delivery:'pickup',delCost:0,deliveryAddr:'',items:[{c:'Package',t:pkg.type,o:pkg.qty+' ชิ้น',qty:1,p:pkg.price,k:pkg.cost,ce:'Package',te:pkg.type,oe:pkg.qty+' pcs'}],extras:[],disc:disc,net:netPrice,cost:pkg.cost,payHist:[{round:1,method:method,amt:netPrice,date:payDateStr,by:curUser.nick}],isPaid:true,pts:pts4(netPrice),promo:promoName,note:'',pickupDate:'',createdAt:fmtDT(),by:curUser.nick};
  DB.orders.push(order);
  m.spend=(m.spend||0)+pkg.price;m.pts=(m.pts||0)+order.pts;
  saveDB();logAction('CREATE_ORDER',order.id+' Package '+pkg.type);
  toast('ซื้อ Package สำเร็จ ✅ '+quota.pkgName);
  closeMo('moBuyPkg');
  setTimeout(function(){showBill(order.id)},400);
}

function bsQty(id,delta){
  var el=$(id);if(!el) return;
  var v=parseInt(el.textContent)||0;
  var maxMap={'bs-q-sheet':1,'bs-q-comf':1,'bs-q-pil':3,'bs-q-bol':3};
  var mx=maxMap[id]||99;
  var nv=Math.max(0,Math.min(mx,v+delta));

  if(id==='bs-q-pil'||id==='bs-q-bol'){

  }
  // Check total ≤5
  var sheet=id==='bs-q-sheet'?nv:parseInt($('bs-q-sheet').textContent)||0;
  var comf=id==='bs-q-comf'?nv:parseInt($('bs-q-comf').textContent)||0;

function buildCalendar(year,month){
  const first=new Date(year,month,1);const lastDay=new Date(year,month+1,0).getDate();
  const startDay=first.getDay();
  const cleanings=DB.orders.filter(o=>o.type==='cleaning'&&o.pickupDate);
  const monthNames=['มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน','กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'];
  let h='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">'+
    '<button class="btn btn-out btn-sm" onclick="calNav(-1)">◀</button>'+
    '<span style="font-weight:700;font-size:16px">'+monthNames[month]+' '+(year+543)+'</span>'+
    '<button class="btn btn-out btn-sm" onclick="calNav(1)">▶</button></div>';
  h+='<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;text-align:center">';
  ['อา','จ','อ','พ','พฤ','ศ','ส'].forEach(d=>{h+='<div style="font-weight:700;font-size:11px;color:var(--t3);padding:6px">'+d+'</div>'});
  for(let i=0;i<startDay;i++) h+='<div></div>';
  for(let d=1;d<=lastDay;d++){
    const dateStr=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const dayClean=cleanings.filter(o=>o.pickupDate===dateStr);
    const isToday=dateStr===todayStr();
    const hasCln=dayClean.length>0;
    h+='<div onclick="showCalDay(\''+dateStr+'\')" style="padding:8px 4px;border-radius:8px;font-size:13px;cursor:pointer;transition:.15s;border:1.5px solid '+(isToday?'var(--pr)':'transparent')+';'+(hasCln?'background:var(--gnl);':'')+'">'+
      '<div style="font-weight:'+(isToday?'800':'400')+'">'+d+'</div>'+

function saveCRMSettings(){
  var s=getShopSettings();
  s.crm={ptsRate:parseInt($('crm-rate').value)||100,redeemRate:parseInt($('crm-redeem').value)||1,vipThreshold:parseInt($('crm-vip').value)||10000,welcomePts:parseInt($('crm-welcome').value)||50,silverMin:parseInt($('crm-silver').value)||3000,goldMin:parseInt($('crm-gold').value)||6000};
  s.ptsRate=s.crm.ptsRate;s.welcomePts=s.crm.welcomePts;
  saveDB();logAction('CHANGE_SETTINGS','อัปเดต CRM');toast('บันทึกตั้งค่า CRM สำเร็จ ✅');
}
function autoUpdateLevels(){
  var s=getShopSettings();var crm=s.crm||{silverMin:3000,goldMin:6000,vipThreshold:10000};
  var updated=0;
  DB.members.forEach(function(m){
    var oldLv=m.level;
    if(m.spend>=crm.vipThreshold) m.level='VIP';
    else if(m.spend>=crm.goldMin) m.level='Gold';
    else if(m.spend>=crm.silverMin) m.level='Silver';
    else m.level='ทั่วไป';
    if(m.level!==oldLv) updated++;
  });
  saveDB();toast('อัปเดตระดับสำเร็จ ✅ เปลี่ยน '+updated+' คน');renderPage('crm');
}

function rptMonthly(){
  var now=new Date();var y=now.getFullYear();var m=now.getMonth();
  var orders=DB.orders.filter(function(o){if(!o.createdAt||o.status==='ยกเลิก')return false;var p=o.createdAt.split('/');return p.length>=3&&parseInt(p[1])===m+1});
  var revenue=orders.reduce(function(s,o){return s+netOf(o)},0);

function openSvcPriceEdit(type,i){
  var label='',price=0,cost=0,expDays=0;
  if(type==='bed'){label=BED_SETS[i].label;price=BED_SETS[i].price;cost=BED_SETS[i].cost}
  else if(type==='cln'){label=CLN_SVCS[i].label;price=CLN_SVCS[i].minPrice;cost=CLN_SVCS[i].cost}
  else if(type==='pkg'){label=PKGS[i].type+' '+PKGS[i].qty;price=PKGS[i].price;cost=PKGS[i].cost;expDays=PKGS[i].expDays}
  var h='<div class="modal-overlay show" id="moPE2"><div class="modal"><div class="modal-head"><h3>✏️ '+label+'</h3><button class="modal-close" onclick="document.getElementById(\'moPE2\').remove()">&times;</button></div><div class="modal-body"><div class="grid g2"><div class="form-group"><label class="form-label">ราคา (฿)</label><input id="sp-p" type="number" value="'+price+'"></div><div class="form-group"><label class="form-label">ต้นทุน (฿)</label><input id="sp-k" type="number" value="'+cost+'"></div></div>'+(type==='pkg'?'<div class="form-group"><label class="form-label">อายุ (วัน)</label><input id="sp-d" type="number" value="'+expDays+'"></div>':'')+'</div><div class="modal-foot"><button class="btn btn-out" onclick="document.getElementById(\'moPE2\').remove()">ยกเลิก</button><button class="btn btn-pr" onclick="saveSvcPrice(\''+type+'\','+i+')">💾 บันทึก</button></div></div></div>';
  document.body.insertAdjacentHTML('beforeend',h);
}
function saveSvcPrice(type,i){
  var p=parseFloat($('sp-p').value)||0,k=parseFloat($('sp-k').value)||0;
  if(type==='bed'){BED_SETS[i].price=p;BED_SETS[i].cost=k}
  else if(type==='cln'){CLN_SVCS[i].minPrice=p;CLN_SVCS[i].cost=k}
  else if(type==='pkg'){PKGS[i].price=p;PKGS[i].cost=k;PKGS[i].expDays=parseInt($('sp-d').value)||90}
  toast('บันทึกสำเร็จ ✅');logAction('EDIT_PRICE',type+' idx:'+i);
  var mo=$('moPE2');if(mo)mo.remove();renderPage('pricelist');
}
function filterPricelist(){

function saveAddPriceItem(){
  var cat=$('ap-cat-new')&&$('ap-cat-new').value.trim()?$('ap-cat-new').value.trim():($('ap-cat')?$('ap-cat').value:'');
  var type=$('ap-type')?$('ap-type').value.trim():'';
  var opt=$('ap-opt')?$('ap-opt').value.trim():'';
  var price=parseFloat($('ap-price')?$('ap-price').value:0)||0;
  var cost=parseFloat($('ap-cost')?$('ap-cost').value:0)||0;
  if(!cat||!type||!price){toast('กรอกหมวด ประเภท และราคา','err');return}
  CAT.push({c:cat,t:type,o:opt,p:price,k:cost,pt:'fixed',sku:$('ap-sku')?$('ap-sku').value.trim():'',ce:'',te:'',oe:''});
  // Update CATS_UNIQUE
  if(!CATS_UNIQUE.includes(cat)) CATS_UNIQUE.push(cat);
  logAction('ADD_PRICE',cat+' '+type+' '+thb(price));
  toast('เพิ่มรายการสำเร็จ ✅ '+type+' '+thb(price));
  var mo=$('moAddPrice');if(mo)mo.remove();renderPage('pricelist');
}

function saveConnectionSettings(){
  var s=getShopSettings();
  var url=$('cn-api-url')?$('cn-api-url').value.trim():'';
  var token=$('cn-line-token')?$('cn-line-token').value.trim():'';
  var secret=$('cn-line-secret')?$('cn-line-secret').value.trim():'';
  var oa=$('cn-line-oa')?$('cn-line-oa').value.trim():'';
  if(url) s.apiUrl=url; else delete s.apiUrl;
  if(token) s.lineChannelToken=token; else delete s.lineChannelToken;
  if(secret) s.lineChannelSecret=secret; else delete s.lineChannelSecret;
  if(oa) s.lineOA=oa;
  var liffId=$('cn-liff-id')?$('cn-liff-id').value.trim():'';
  if(liffId) s.liffId=liffId; else delete s.liffId;
  s.dailyReportTo=$('cn-report-to')?$('cn-report-to').value.trim():'';
  s.dailyReportTime=$('cn-report-time')?$('cn-report-time').value:'21:00';
  saveDB();logAction('CHANGE_SETTINGS','อัปเดตการเชื่อมต่อ');
  toast('💾 บันทึกการเชื่อมต่อสำเร็จ ✅');
  // Auto-push settings to cloud so Apps Script gets the new token
  if(s.apiUrl){
    var settingsRows=Object.keys(s).map(function(k){var v=s[k];return{key:k,value:typeof v==='object'?JSON.stringify(v):String(v)}});
    fetch(s.apiUrl+'?action=replaceAll&sheet=settings',{method:'POST',mode:'no-cors',body:JSON.stringify({rows:settingsRows})});
    toast('☁️ Sync ตั้งค่าขึ้น Cloud แล้ว');
  }
  showSettingsTab(document.querySelector('.tab.act'),'connect');
}
async function testApiConnection(){
  var url=$('cn-api-url')?$('cn-api-url').value.trim():'';
  if(!url){toast('กรอก URL ก่อน','err');return}
  toast('🔌 กำลังทดสอบ...','info');
  try{
    var data=await new Promise(function(resolve,reject){
      var cbName='_test_'+Date.now();
      var timeout=setTimeout(function(){delete window[cbName];reject(new Error('Timeout — ตรวจสอบ URL หรือ Deploy ใหม่'))},15000);
      window[cbName]=function(d){clearTimeout(timeout);delete window[cbName];resolve(d)};
      var sc=document.createElement('script');
      sc.src=url+'?action=ping&callback='+cbName;
      sc.onerror=function(){clearTimeout(timeout);delete window[cbName];reject(new Error('ไม่สามารถเชื่อมต่อ URL นี้ได้'))};
      document.head.appendChild(sc);
    });
    if(data.ok) toast('✅ เชื่อมต่อสำเร็จ! API v'+(data.v||'?'));
    else toast('❌ API ตอบกลับผิดพลาด','err');
  }catch(err){toast('❌ '+err.message,'err')}
}

// ═══ BACKUP / RESTORE ═══
function exportBackup(){
  const backup={_backup:{version:'4.0',app:'SAKKANID Laundry POS',exportDate:new Date().toISOString(),exportBy:curUser?curUser.nick:'',counts:{orders:DB.orders.length,members:DB.members.length,quotas:(DB.quotas||[]).length,promos:(DB.promos||[]).length}},...DB};
  const blob=new Blob([JSON.stringify(backup,null,2)],{type:'application/json'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download='SAKKANID_backup_'+todayStr().replace(/-/g,'')+'.json';
  a.click();toast('Export Backup สำเร็จ ✅');
  logAction('EXPORT_DATA','Export backup');
}
function importBackupClick(){$('importFile').click()}
function importBackup(e){
  const file=e.target.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=function(ev){
    try{
      const data=JSON.parse(ev.target.result);
      if(!data._backup||!data.orders){toast('ไม่ใช่ไฟล์ Backup ของ SAKKANID','err');return}
      const cnt=data._backup.counts||{};
      if(!confirm('จะ Import ข้อมูล:\n• ออเดอร์: '+(cnt.orders||0)+'\n• สมาชิก: '+(cnt.members||0)+'\n\n⚠️ ข้อมูลเดิมจะถูกทับ — ยืนยัน?')) return;
      // Auto-backup before import
      exportBackup();
      // Import
      DB=data;delete DB._backup;saveDB();
      logAction('IMPORT_DATA','Import backup');
      toast('Import สำเร็จ ✅ รีโหลดหน้า...');
      setTimeout(()=>location.reload(),1000);
    }catch(err){toast('ไฟล์ไม่ถูกต้อง: '+err.message,'err')}
  };reader.readAsText(file);
}

  o.status='ยกเลิก';o.cancelReason=reason;o.cancelDate=fmtDT();o.cancelBy=curUser.nick;
  // Handle refund
  if(isPaidCheck(o)&&$('cancel-refund')){
    const refType=$('cancel-refund').value;
    const refAmt=refType==='full'?paidTotal(o):refType==='partial'?(parseFloat($('cancel-amt').value)||0):0;
    if(refAmt>0){
      o.refund={amount:refAmt,reason,type:refType,method:'เงินสด',date:fmtDT(),by:curUser.nick};
      const m=gM(o.mid);if(m){m.spend=Math.max(0,(m.spend||0)-refAmt)}
    }
  }
  saveDB();logAction('CANCEL_ORDER',oid+' เหตุผล: '+reason);
  toast(oid+' ยกเลิกแล้ว','warn');
  const mo=$('moCancelOrder');if(mo) mo.remove();renderPage(curPage);
}

// ═══ SHIFT MANAGEMENT ═══
function getActiveShift(){return (DB.shifts||[]).find(s=>!s.closedAt)}
function openShift(){
  const active=getActiveShift();
  if(active){toast('กะยังเปิดอยู่ โดย '+active.openedBy,'warn');return}
  const cashStart=prompt('เงินสดเริ่มต้น (ทอน) ฿:','1000');
  if(cashStart===null) return;
  if(!DB.shifts) DB.shifts=[];
  DB.shifts.push({id:'SFT-'+String(DB.shifts.length+1).padStart(4,'0'),openedBy:curUser.nick,openedAt:fmtDT(),closedBy:'',closedAt:'',cashStart:parseFloat(cashStart)||0,cashEnd:0,systemCash:0,diff:0,totalSales:0,orderCount:0,note:''});
  saveDB();logAction('OPEN_SHIFT','เปิดกะ เงินสดเริ่ม '+thb(cashStart));
  toast('เปิดกะสำเร็จ ✅ เงินสดเริ่มต้น '+thb(cashStart));renderPage(curPage);
}
function closeShift(){
  const active=getActiveShift();
  if(!active){toast('ไม่มีกะที่เปิดอยู่','warn');return}
  const cashEnd=prompt('นับเงินสดจริง (฿):','');
  if(cashEnd===null) return;
  // Calculate system cash for this shift
  const shiftOrders=DB.orders.filter(o=>o.createdAt>=active.openedAt&&o.status!=='ยกเลิก');
  const cashPayments=shiftOrders.reduce((s,o)=>{
    return s+(o.payHist||[]).filter(p=>p.method==='เงินสด'&&p.date>=active.openedAt).reduce((ss,p)=>ss+p.amt,0);
  },0);
  active.closedBy=curUser.nick;active.closedAt=fmtDT();
  active.cashEnd=parseFloat(cashEnd)||0;
  active.systemCash=active.cashStart+cashPayments;
  active.diff=active.cashEnd-active.systemCash;
  active.totalSales=shiftOrders.reduce((s,o)=>s+netOf(o),0);
  active.orderCount=shiftOrders.length;
  saveDB();logAction('CLOSE_SHIFT','ปิดกะ เงินสดจริง '+thb(cashEnd)+' ระบบ '+thb(active.systemCash)+' ผลต่าง '+thb(active.diff));
  toast('ปิดกะสำเร็จ ✅ ผลต่าง: '+thb(active.diff)+(active.diff>=0?' (เกิน)':' (ขาด)'));
  renderPage(curPage);
}

    expenses.map(function(e){return '<tr><td style="font-size:11px">'+e.date+'</td><td><span class="badge bg-am">'+e.category+'</span></td><td>'+e.name+'</td><td style="color:var(--rd);font-weight:700">'+thb(e.amount)+'</td><td>'+e.by+'</td></tr>'}).join('')+'</table>':'<div class="empty-state"><div class="es-text">ยังไม่มีค่าใช้จ่าย</div></div>')+'</div>';

function saveExpense(){
  var cat=$('exp-cat')?$('exp-cat').value:'';
  var name=$('exp-name')?$('exp-name').value.trim():'';
  var amt=parseFloat($('exp-amt')?$('exp-amt').value:0)||0;
  if(!name||!amt){toast('กรอกรายการและจำนวนเงิน','err');return}
  if(!DB.expenses) DB.expenses=[];
  DB.expenses.push({id:'EXP-'+String(DB.expenses.length+1).padStart(4,'0'),category:cat,name:name,amount:amt,date:fmtDT(),by:curUser.nick});
  saveDB();logAction('ADD_EXPENSE',name+' '+thb(amt));
  toast('บันทึกค่าใช้จ่าย ✅ '+thb(amt));renderPage('expense');
}
function getExpenseCategories(){
  var defaults=['วัสดุสิ้นเปลือง','ค่าสาธารณูปโภค','ค่าแรง','ซ่อมบำรุง','ค่าเช่า','ค่าขนส่ง','วัตถุดิบ','อื่นๆ'];
  var custom=getShopSettings().expenseCategories||[];
  return defaults.concat(custom.filter(function(c){return defaults.indexOf(c)<0}));
}
function addExpenseCategory(){
  var name=prompt('ชื่อหมวดค่าใช้จ่ายใหม่:');
  if(!name||!name.trim()) return;
  var s=getShopSettings();if(!s.expenseCategories) s.expenseCategories=[];
  if(getExpenseCategories().indexOf(name.trim())>=0){toast('หมวดนี้มีอยู่แล้ว','warn');return}
  s.expenseCategories.push(name.trim());saveDB();
  toast('เพิ่มหมวด "'+name.trim()+'" สำเร็จ ✅');renderPage('expense');
}

  if(o.type==='quota'&&o.mid){

      h+='<div style="font-size:11px;font-weight:700;color:#333;text-align:center">📦 โควต้า Package</div>';
      mQuotas.forEach(function(q){
        h+='<div style="font-size:10px;color:#666;text-align:center;margin-top:2px">'+q.pkgName+'</div>';

  // ── Promo used ──
  if(o.promo) h+='<div style="font-size:10px;margin-top:4px;color:#C4820A">🎁 โปร: '+o.promo+'</div>';

  h+='</div>';return h;
}

// ═══ KEYBOARD SHORTCUTS ═══
function initShortcuts(){
  document.addEventListener('keydown',function(e){
    if(!curUser) return;
    if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT'||e.target.tagName==='TEXTAREA') return;
    if(e.key==='F1'){e.preventDefault();navTo('laundry')}
    else if(e.key==='F2'){e.preventDefault();navTo('package')}
    else if(e.key==='F3'){e.preventDefault();navTo('orders')}
    else if(e.key==='F4'){e.preventDefault();navTo('dashboard')}
    else if(e.key==='F5'){e.preventDefault();renderPage(curPage);toast('🔄 Refresh')}
    else if(e.key==='?'&&e.shiftKey){showShortcutsHelp()}
    else if(e.key==='e'&&e.ctrlKey){e.preventDefault();renderExpensePage()}
  });
}

function setVal(id,v){var el=$(id);if(el)el.value=v}

function inDays(n){var d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10)}
function updBadges(){
  var active=DB.orders.filter(function(o){return !['เสร็จสิ้น','ปิดงาน','ยกเลิก'].includes(o.status)}).length;
  var unpaid=DB.orders.filter(function(o){return !isPaidCheck(o)&&o.status!=='ยกเลิก'&&!['เสร็จสิ้น','ปิดงาน'].includes(o.status)}).length;
  document.querySelectorAll('.sb-item').forEach(function(el){
    var pg=el.dataset.page;var badge=el.querySelector('.sb-badge');
    if(pg==='orders'&&active>0){if(!badge){badge=document.createElement('span');badge.className='sb-badge';el.appendChild(badge)}badge.textContent=active}
    else if(badge) badge.remove();
  });
}
function calcPromoDisc(net,promo){
  if(!promo) return 0;
  if(promo.type==='percent') return Math.round(net*promo.value/100);
  if(promo.type==='fixed'||promo.type==='points') return promo.value;
  return 0;
}

let dailyReportTimer=null;
function startDailyReportSchedule(){
  if(dailyReportTimer) clearInterval(dailyReportTimer);
  var s=getShopSettings();
  if(!s.dailyReportTime||!s.dailyReportTo) return;
  dailyReportTimer=setInterval(function(){
    var now=new Date();
    var hhmm=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
    if(hhmm===s.dailyReportTime){
      var sentKey='dailyReport_'+todayStr();
      if(!localStorage.getItem(sentKey)){
        localStorage.setItem(sentKey,'1');
        sendDailyReport();
      }
    }
  },30000);
}
async function sendDailyReport(){
  var s=getShopSettings();
  var to=s.dailyReportTo||'';
  if(!to){toast('⚠️ ยังไม่ได้ตั้งค่า LINE User ID เจ้าของร้าน','err');return}
  var today=todayStr();
  var allOrders=DB.orders||[];
  var todayOrders=allOrders.filter(function(o){return (o.createdAt||'').includes(today.replace(/-/g,'/').replace(/20/,'25'))||((o.createdAt||'').includes(today))});
  var total=todayOrders.length;
  var revenue=todayOrders.filter(function(o){return isPaidCheck(o)}).reduce(function(s,o){return s+netOf(o)},0);
  var unpaid=todayOrders.filter(function(o){return !isPaidCheck(o)});
  var unpaidAmt=unpaid.reduce(function(s,o){return s+remaining(o)},0);
  // Count by type
  var byType={};todayOrders.forEach(function(o){var t=o.type||'other';byType[t]=(byType[t]||0)+1});
  // Count by status
  var byStatus={};todayOrders.forEach(function(o){var st=o.status||'';byStatus[st]=(byStatus[st]||0)+1});
  // Build message
  var msg='📊 รายงานสรุปประจำวัน\n'+s.shopName+'\n📅 '+formatBillDate(new Date().toISOString())+'\n';
  msg+='═══════════════\n';
  msg+='📋 ออเดอร์วันนี้: '+total+' รายการ\n';
  msg+='💰 รายได้: '+thb(revenue)+'\n';
  if(unpaid.length) msg+='❌ ค้างชำระ: '+unpaid.length+' รายการ ('+thb(unpaidAmt)+')\n';
  else msg+='✅ ไม่มียอดค้างชำระ\n';
  msg+='───────────\n';
  msg+='📦 แยกตามบริการ:\n';
  var typeLabels={laundry:'👕 ซักรีด',bedset:'🛏️ เครื่องนอน',cleaning:'🧹 ทำความสะอาด',pkg_buy:'📦 ซื้อ Package',quota:'📦 ใช้โควต้า'};
  Object.keys(byType).forEach(function(t){msg+='  '+(typeLabels[t]||t)+': '+byType[t]+' รายการ\n'});
  msg+='───────────\n';
  msg+='📊 แยกตามสถานะ:\n';
  Object.keys(byStatus).forEach(function(st){msg+='  '+st+': '+byStatus[st]+'\n'});
  // Expenses
  var todayExp=(DB.expenses||[]).filter(function(e){return (e.date||'').includes(today.replace(/-/g,'/'))});
  if(todayExp.length){
    var expTotal=todayExp.reduce(function(s,e){return s+(e.amount||0)},0);
    msg+='───────────\n💸 ค่าใช้จ่ายวันนี้: '+todayExp.length+' รายการ ('+thb(expTotal)+')\n';
  }
  // Members
  var newMembers=(DB.members||[]).filter(function(m){return (m.joinDate||'').includes(today.replace(/-/g,'/'))});
  if(newMembers.length) msg+='───────────\n👥 สมาชิกใหม่: '+newMembers.length+' คน\n';

// ═══ GOOGLE SHEETS SYNC ═══
function getApiUrl(){var s=getShopSettings();return s.apiUrl||''}
function getLineToken(){var s=getShopSettings();return s.lineChannelToken||''}
let syncStatus='idle';
let lastSyncTime=null;

async function apiCall(action,sheet,body){
  syncStatus='syncing';updSyncUI();
  try{
    var data;
    if(body&&Object.keys(body).length){
      // WRITE: POST with no-cors (fire-and-forget, then verify with GET)
      var url=getApiUrl()+'?action='+action+(sheet?'&sheet='+sheet:'');
      await fetch(url,{method:'POST',mode:'no-cors',body:JSON.stringify(body)});
      data={ok:true,note:'sent'};
    }else{
      // READ: JSONP via script tag (bypasses CORS completely)
      data=await jsonpCall(action,sheet);
    }
    syncStatus=data.ok?'success':'error';
    if(data.ok) lastSyncTime=new Date();
    updSyncUI();return data;
  }catch(err){
    syncStatus='error';updSyncUI();
    return {ok:false,error:err.message};
  }
}

// JSONP: inject <script> tag to bypass CORS
function jsonpCall(action,sheet){
  return new Promise(function(resolve,reject){
    var cbName='_skcb_'+Date.now()+'_'+Math.floor(Math.random()*9999);
    var timeout=setTimeout(function(){
      delete window[cbName];if(s.parentNode)s.parentNode.removeChild(s);
      reject(new Error('Timeout'));
    },30000);
    window[cbName]=function(data){
      clearTimeout(timeout);delete window[cbName];
      if(s.parentNode)s.parentNode.removeChild(s);
      resolve(data);
    };
    var url=getApiUrl()+'?action='+action+(sheet?'&sheet='+sheet:'')+'&callback='+cbName;
    var s=document.createElement('script');
    s.src=url;s.onerror=function(){clearTimeout(timeout);delete window[cbName];s.parentNode.removeChild(s);reject(new Error('Script load failed'))};
    document.head.appendChild(s);
  });
}

    bed_sets:BED_SETS.map(function(b){return{size:b.size,label:b.label,price:b.price,cost:b.cost,items:JSON.stringify(b.items)}}),
    cln_svcs:CLN_SVCS.map(function(s){return{type:s.type,label:s.label,minPrice:s.minPrice,cost:s.cost}}),
    packages:PKGS.map(function(p){return{type:p.type,qty:p.qty,price:p.price,cost:p.cost,expDays:p.expDays}}),
    settings:Object.keys(getShopSettings()).map(function(k){var v=getShopSettings()[k];return{key:k,value:typeof v==='object'?JSON.stringify(v):String(v)}})
  };
  var success=0;
  for(var name in sheets){
    if(sheets[name].length){
      try{
        var url=apiUrl+'?action=replaceAll&sheet='+name;
        await fetch(url,{method:'POST',mode:'no-cors',body:JSON.stringify({rows:sheets[name]})});
        success++;
      }catch(e){console.error('Push '+name+' failed:',e)}
    }
  }
  syncStatus='success';lastSyncTime=new Date();updSyncUI();
  toast('✅ Sync สำเร็จ! ('+success+'/15 sheets)');
  logAction('SYNC_PUSH','Push to Google Sheets (15 sheets)');
}

// ── Pull all data from Sheets ──
async function syncPullAll(){
  toast('📥 กำลังดึงข้อมูลจาก Cloud...','info');
  try{
    var result=await jsonpCall('getFullDB','');
    if(result.ok&&result.data){
    var d=result.data;
    // Merge data
    if(d.orders&&d.orders.length){DB.orders=d.orders.map(fixOrder)}
    if(d.members&&d.members.length){DB.members=d.members}
    if(d.quotas&&d.quotas.length){DB.quotas=d.quotas}
    if(d.promos&&d.promos.length){DB.promos=d.promos}
    if(d.expenses&&d.expenses.length){DB.expenses=d.expenses}
    if(d.shifts&&d.shifts.length){DB.shifts=d.shifts}
    // Update pricelist
    if(d.pricelist&&d.pricelist.length){
      CAT.length=0;
      d.pricelist.forEach(function(it){CAT.push({c:it.c,ce:it.ce||'',t:it.t,te:it.te||'',o:it.o||'',oe:it.oe||'',p:Number(it.p)||0,k:Number(it.k)||0,pt:it.pt||'fixed',sku:it.sku||''})});
      CATS_UNIQUE.length=0;[...new Set(CAT.map(function(x){return x.c}))].forEach(function(c){CATS_UNIQUE.push(c)});
    }
    // Update BED_SETS from bed_sets sheet
    if(d.bed_sets&&d.bed_sets.length){
      BED_SETS.length=0;
      d.bed_sets.forEach(function(b){var items=b.items;if(typeof items==='string'){try{items=JSON.parse(items)}catch(e){items=[]}}BED_SETS.push({size:b.size,label:b.label,price:Number(b.price)||0,cost:Number(b.cost)||0,items:items||[]})});
    }
    // Update CLN_SVCS from cln_svcs sheet
    if(d.cln_svcs&&d.cln_svcs.length){
      CLN_SVCS.length=0;
      d.cln_svcs.forEach(function(s){CLN_SVCS.push({type:s.type,label:s.label,minPrice:Number(s.minPrice)||0,cost:Number(s.cost)||0})});
    }
    // Update PKGS from packages sheet
    if(d.packages&&d.packages.length){
      PKGS.length=0;
      d.packages.forEach(function(p){PKGS.push({type:p.type,qty:Number(p.qty)||0,price:Number(p.price)||0,cost:Number(p.cost)||0,expDays:Number(p.expDays)||90})});
    }
    // Restore settings
    if(d.settings&&d.settings.length){
      d.settings.forEach(function(s){
        if(s.key&&s.value!==undefined){
          try{DB.shopSettings[s.key]=JSON.parse(s.value)}catch(e){DB.shopSettings[s.key]=s.value}
        }
      });
    }
    saveDB();
    toast('✅ ดึงข้อมูลจาก Cloud สำเร็จ!');
    logAction('SYNC_PULL','Pull all data from Google Sheets');
    renderPage(curPage);
  }else{
    toast('❌ ดึงข้อมูลล้มเหลว: '+(result.error||''),'err');
  }
  return result;
  }catch(err){toast('❌ ดึงข้อมูลล้มเหลว: '+err.message,'err');return{ok:false}}
}

// ── Fix order data types from Sheets ──
function fixOrder(o){
  if(typeof o.items==='string'){try{o.items=JSON.parse(o.items)}catch(e){o.items=[]}}
  if(typeof o.extras==='string'){try{o.extras=JSON.parse(o.extras)}catch(e){o.extras=[]}}
  if(typeof o.payHist==='string'){try{o.payHist=JSON.parse(o.payHist)}catch(e){o.payHist=[]}}
  o.net=Number(o.net)||0;o.disc=Number(o.disc)||0;o.cost=Number(o.cost)||0;
  o.delCost=Number(o.delCost)||0;o.pts=Number(o.pts)||0;
  o.isPaid=o.isPaid===true||o.isPaid==='true';
  return o;
}

// ── Auto-sync after save (debounced push) ──
let syncTimer=null;
const originalSaveDB=saveDB;
saveDB=function(){
  originalSaveDB();
  if(syncTimer) clearTimeout(syncTimer);
  syncTimer=setTimeout(function(){
    if(getApiUrl()&&curUser) syncPushAll();
  },5000);
};

// ── Auto-pull every 60 seconds ──
let autoPullInterval=null;
function startAutoPull(){
  if(autoPullInterval) clearInterval(autoPullInterval);
  autoPullInterval=setInterval(function(){
    if(!getApiUrl()||!curUser||syncStatus==='syncing') return;
    syncPullSilent();
  },30000);
}
async function syncPullSilent(){
  try{
    var data=await jsonpCall('getFullDB','');
    if(!data.ok||!data.data) return;
    var d=data.data;var changed=false;
    // CRITICAL: only update if cloud has data (never overwrite with empty!)
    if(d.orders&&d.orders.length>0&&d.orders.length!==(DB.orders||[]).length){DB.orders=d.orders.map(fixOrder);changed=true}
    if(d.members&&d.members.length>0&&d.members.length!==(DB.members||[]).length){
      DB.members=d.members.map(function(m){var p=String(m.phone||'').replace(/^'+/,'').replace(/[^0-9]/g,'');if(p&&p.charAt(0)!=='0')p='0'+p;m.phone=p;return m});changed=true}
    if(d.quotas&&d.quotas.length>0&&d.quotas.length!==(DB.quotas||[]).length){DB.quotas=d.quotas;changed=true}
    if(d.promos&&d.promos.length>0&&d.promos.length!==(DB.promos||[]).length){DB.promos=d.promos;changed=true}
    if(d.expenses&&d.expenses.length>0&&d.expenses.length!==(DB.expenses||[]).length){DB.expenses=d.expenses;changed=true}
    if(d.pricelist&&d.pricelist.length>0){
      var newP=d.pricelist.some(function(it,i){var o=CAT[i];return !o||Number(it.p)!==o.p});
      if(newP){CAT.length=0;d.pricelist.forEach(function(it){CAT.push({c:it.c,ce:it.ce||'',t:it.t,te:it.te||'',o:it.o||'',oe:it.oe||'',p:Number(it.p)||0,k:Number(it.k)||0,pt:it.pt||'fixed',sku:it.sku||''})});CATS_UNIQUE.length=0;[...new Set(CAT.map(function(x){return x.c}))].forEach(function(c){CATS_UNIQUE.push(c)});changed=true}
    }
    if(d.bed_sets&&d.bed_sets.length>0){
      var bc=d.bed_sets.some(function(b,i){var o=BED_SETS[i];return !o||Number(b.price)!==o.price});
      if(bc){BED_SETS.length=0;d.bed_sets.forEach(function(b){var items=b.items;if(typeof items==='string'){try{items=JSON.parse(items)}catch(e){items=[]}}BED_SETS.push({size:b.size,label:b.label,price:Number(b.price)||0,cost:Number(b.cost)||0,items:items||[]})});changed=true}
    }
    if(d.cln_svcs&&d.cln_svcs.length>0){
      var cc=d.cln_svcs.some(function(s,i){var o=CLN_SVCS[i];return !o||Number(s.minPrice)!==o.minPrice});
      if(cc){CLN_SVCS.length=0;d.cln_svcs.forEach(function(s){CLN_SVCS.push({type:s.type,label:s.label,minPrice:Number(s.minPrice)||0,cost:Number(s.cost)||0})});changed=true}
    }
    if(d.packages&&d.packages.length>0){
      var pc=d.packages.some(function(p,i){var o=PKGS[i];return !o||Number(p.price)!==o.price});
      if(pc){PKGS.length=0;d.packages.forEach(function(p){PKGS.push({type:p.type,qty:Number(p.qty)||0,price:Number(p.price)||0,cost:Number(p.cost)||0,expDays:Number(p.expDays)||90})});changed=true}
    }
    if(d.settings&&d.settings.length>0){
      d.settings.forEach(function(s){
        if(s.key&&s.value!==undefined){try{DB.shopSettings[s.key]=JSON.parse(s.value)}catch(e){DB.shopSettings[s.key]=s.value}}
      });
    }
    if(changed){
      originalSaveDB();syncStatus='success';lastSyncTime=new Date();updSyncUI();
      toast('🔄 ข้อมูลอัปเดตจาก Cloud','info');
      var rp=['orders','history','members','pricelist','report','dashboard','promo','expense'];
      if(rp.indexOf(curPage)>=0) renderPage(curPage);
    }else{syncStatus='success';lastSyncTime=new Date();updSyncUI()}
  }catch(e){/* silent */}
}

// ── Sync UI indicator ──
function updSyncUI(){
  var el=$('syncIndicator');
  if(!el) return;
  var icons={idle:'☁️',syncing:'🔄',success:'✅',error:'❌'};
  var labels={idle:'Cloud',syncing:'Syncing...',success:'Synced',error:'Error'};
  el.innerHTML='<span style="font-size:11px;cursor:pointer" onclick="openSyncPanel()" title="Last sync: '+(lastSyncTime?lastSyncTime.toLocaleTimeString():'never')+'">'+icons[syncStatus]+' '+labels[syncStatus]+'</span>';
}

async function syncTestConnection(){
  toast('🔌 กำลังทดสอบ...','info');
  try{
    var r=await jsonpCall('ping','');
    if(r.ok) toast('✅ เชื่อมต่อสำเร็จ! API v'+(r.v||'?'));
    else toast('❌ เชื่อมต่อไม่ได้: '+(r.error||''),'err');
    return r;
  }catch(err){
    toast('❌ เชื่อมต่อไม่ได้: '+err.message,'err');
    return {ok:false,error:err.message};
  }
}
